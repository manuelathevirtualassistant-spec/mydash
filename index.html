<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Two Witches & A Broom · Manuela VA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --purple:#3d2b8e;--purple-mid:#5c43b0;--purple-light:#ebe8f7;
  --purple-soft:#f3f1fb;--lavender:#d4cef5;--cream:#faf9f6;
  --text:#1a1630;--text-muted:#6b6588;--accent:#8b73e0;
  --sidebar-w:230px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--purple);display:flex;flex-direction:column;padding:22px 16px;z-index:200;overflow-y:auto;}
.logo-area{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.13);}
.logo-icon{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.logo-text h2{font-family:'Playfair Display',serif;font-size:12px;color:white;line-height:1.3;margin:0;}
.logo-text span{font-size:10px;color:var(--lavender);font-weight:300;}
.nav-section{margin-bottom:6px;}
.nav-section-label{display:flex;align-items:center;justify-content:space-between;font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--lavender);opacity:.6;padding:12px 8px 5px;font-weight:600;}
.nav-section-label button{opacity:0;background:none;border:none;color:var(--lavender);cursor:pointer;font-size:14px;padding:0 2px;transition:opacity .2s;}
.nav-section-label:hover button{opacity:.7;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;transition:all .2s;}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.12);color:white;}
.nav-item .ni-emoji{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.nav-item .ni-label{flex:1;}
.nav-item .ni-actions{display:none;gap:2px;}
.nav-item:hover .ni-actions{display:flex;}
.ni-actions button{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:2px 3px;font-size:12px;border-radius:4px;transition:color .15s;}
.add-page-btn{display:flex;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.4);font-size:12px;border:1px dashed rgba(255,255,255,.2);background:none;width:100%;text-align:left;transition:all .2s;margin-top:4px;font-family:'DM Sans',sans-serif;}
.add-page-btn:hover{color:rgba(255,255,255,.8);}
.role-box{margin-top:auto;padding:12px;background:rgba(255,255,255,.08);border-radius:10px;}
.role-box .rb-name{font-size:13px;color:white;font-weight:600;}
.role-box .rb-role{font-size:11px;color:var(--lavender);margin-top:2px;}

.main{margin-left:var(--sidebar-w);padding:32px 36px;min-height:100vh;}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;}
.page-header-left h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--purple);line-height:1;cursor:text;margin:0;}
.page-header-left p{margin-top:5px;font-size:13px;color:var(--text-muted);font-weight:300;cursor:text;margin:0;}
.date-badge{background:var(--purple-light);border-radius:10px;padding:10px 16px;text-align:right;flex-shrink:0;}
.date-badge .day{font-family:'Playfair Display',serif;font-size:22px;color:var(--purple);font-weight:700;}
.date-badge .ds{font-size:11px;color:var(--text-muted);}

.cards-grid{display:flex;flex-direction:column;gap:20px;margin-top:24px;}
.row{display:flex;gap:16px;align-items:flex-start;flex-wrap:nowrap;overflow-x:auto;}

.card{background:white;border-radius:12px;border:1px solid #e8e4f7;box-shadow:0 2px 8px rgba(61,43,142,.08);overflow:hidden;display:flex;flex-direction:column;transition:all .2s;cursor:grab;flex:0 0 320px;min-height:200px;}
.card:hover{box-shadow:0 4px 16px rgba(61,43,142,.12);}
.card.dragging{opacity:.3;cursor:grabbing;z-index:100;transform:scale(0.95);}

.card-header{background:var(--purple);color:white;padding:14px;cursor:grab;user-select:none;}
.card-header:active{cursor:grabbing;}
.card-title{font-size:15px;font-weight:600;color:white;margin:0;}

.card-body{padding:14px;flex:1;display:flex;flex-direction:column;}
.card-content{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;margin-bottom:10px;flex:1;overflow-y:auto;max-height:200px;}
.card-content:focus{outline:none;background:var(--purple-soft);padding:4px;margin:-4px;}

.card-actions{display:flex;gap:4px;margin-top:auto;padding-top:10px;border-top:1px solid #e8e4f7;}
.card-actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px 6px;font-size:13px;border-radius:4px;transition:all .15s;}
.card-actions button:hover{background:var(--purple-soft);color:var(--purple);}

.drop-zone{min-height:320px;flex:0 0 320px;border:2px dashed #d4cef5;border-radius:12px;padding:8px;background:transparent;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;opacity:0;transition:all .2s;pointer-events:none;}
.drop-zone.drag-over{opacity:1;border-color:var(--accent);background:var(--purple-soft);pointer-events:auto;}
.drop-zone.drag-over-row{opacity:1;border-color:var(--accent);background:var(--purple-soft);pointer-events:auto;}

.add-card-btn{padding:12px;border:1px dashed #d4cef5;border-radius:10px;background:none;color:var(--text-muted);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .2s;margin-top:20px;width:100%;}
.add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--purple-soft);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:20px;padding:28px;width:min(420px,90vw);box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--purple);margin-bottom:20px;}
.modal label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px;}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 13px;border:1.5px solid #e8e4f7;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;margin-bottom:16px;}
.modal input:focus,.modal textarea:focus{border-color:var(--accent);}
.modal textarea{min-height:100px;resize:vertical;}
.modal .emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.modal .emoji-opt{width:36px;height:36px;border-radius:8px;border:2px solid transparent;background:var(--purple-soft);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal .emoji-opt:hover,.modal .emoji-opt.selected{border-color:var(--accent);background:var(--purple-light);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}
.btn-cancel{padding:9px 20px;border-radius:10px;border:1.5px solid #e8e4f7;background:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-muted);transition:all .2s;}
.btn-cancel:hover{border-color:var(--accent);color:var(--accent);}
.btn-confirm{padding:9px 20px;border-radius:10px;border:none;background:var(--purple);color:white;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;}
.btn-confirm:hover{background:var(--purple-mid);}
.btn-danger{padding:9px 20px;border-radius:10px;border:none;background:#fde8e8;color:#e05c5c;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;}
.btn-danger:hover{background:#e05c5c;color:white;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo-area">
    <div class="logo-icon">🧙</div>
    <div class="logo-text">
      <h2>Two Witches & A Broom</h2>
      <span>Manuela VA</span>
    </div>
  </div>
  <div id="nav-sections"></div>
  <div class="role-box">
    <div class="rb-name">Manuela Oliveira</div>
    <div class="rb-role">CX & Sales VA</div>
  </div>
</div>

<main class="main">
  <div class="page-header">
    <div class="page-header-left">
      <h1 id="page-title" contenteditable="true">Dashboard</h1>
      <p id="page-subtitle" contenteditable="true">Welcome</p>
    </div>
    <div class="date-badge">
      <div class="day" id="day-name">Mon</div>
      <div class="ds" id="date-str">Jan 1</div>
    </div>
  </div>
  <div id="cards-grid" class="cards-grid"></div>
  <button class="add-card-btn" onclick="addCard()">＋ Add card</button>
</main>

<div class="modal-overlay" id="modal-page">
  <div class="modal">
    <h3>New Page</h3>
    <label>Icon</label>
    <div class="emoji-row" id="page-emoji-row">
      <span class="emoji-opt selected" data-emoji="📋">📋</span>
      <span class="emoji-opt" data-emoji="💬">💬</span>
      <span class="emoji-opt" data-emoji="🧼">🧼</span>
      <span class="emoji-opt" data-emoji="💰">💰</span>
      <span class="emoji-opt" data-emoji="🏢">🏢</span>
    </div>
    <label>Name</label>
    <input type="text" id="page-name-input" placeholder="Page name..."/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-page')">Cancel</button>
      <button class="btn-confirm" id="modal-page-save">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-card">
  <div class="modal">
    <h3>Add Card</h3>
    <label>Title</label>
    <input type="text" id="card-title-input" placeholder="Card title..."/>
    <label>Content</label>
    <textarea id="card-content-input" placeholder="Content..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-card')">Cancel</button>
      <button class="btn-confirm" id="modal-card-save">Add</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-delete">
  <div class="modal">
    <h3>Delete?</h3>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:24px;">This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-delete')">Cancel</button>
      <button class="btn-danger" id="modal-delete-confirm">Delete</button>
    </div>
  </div>
</div>

<script>
// Estrutura simples: cards em array, renderização automática cria rows/columns
let appData = {
  pages: [
    {
      id: 'p1',
      emoji: '🏠',
      label: 'Dashboard',
      title: 'Dashboard',
      subtitle: 'Overview & daily tasks',
      cards: [
        {id: 'c1', row: 0, col: 0, title: 'Daily Routine', content: '🟢 Morning - Check Schedule\n🟣 Ongoing - Handle Leads\n🟠 Post-clean - Follow-up\n🟢 Next day - 24h Call'},
        {id: 'c2', row: 0, col: 1, title: 'Never Do / Always Do', content: '🚫 NEVER:\n• Hourly rate to clients\n• Use "time"\n• Share personal phone\n\n✅ ALWAYS:\n• Push recurring\n• Update ZenMaid\n• Offer reschedule'},
        {id: 'c3', row: 0, col: 2, title: 'Min. Service', content: '$150\n\nNever go below'},
      ]
    },
    {
      id: 'p2',
      emoji: '💬',
      label: 'Sales',
      title: 'Sales Playbook',
      subtitle: 'Scripts and strategies',
      cards: [
        {id: 'c4', row: 0, col: 0, title: 'Sales Call Steps', content: '1️⃣ Build Rapport\n2️⃣ Discovery\n3️⃣ Identify Pain\n4️⃣ Offer Solution\n5️⃣ Close'},
        {id: 'c5', row: 0, col: 0, title: 'Discovery Questions', content: '🛏️ Bedrooms?\n🚿 Bathrooms?\n📐 Sqft?\n👨‍👩‍👧 Adults/kids?\n🐶 Pets?'},
      ]
    },
    {
      id: 'p3',
      emoji: '🧼',
      label: 'Services',
      title: 'Services Menu',
      subtitle: 'What we offer',
      cards: [
        {id: 'c6', row: 0, col: 0, title: 'Service Types', content: '🟢 Recurring - Weekly/Biweekly\n🔵 General - One time\n🟠 TTB - $490+\n🟣 Priority - Custom'},
      ]
    },
  ]
};

let currentPageId = 'p1';
let draggedCard = null;
let dragStartX = 0;
let dragStartY = 0;

const now = new Date();
document.getElementById('day-name').textContent = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
document.getElementById('date-str').textContent = now.toLocaleDateString('en-US', {month:'short', day:'numeric'});

renderApp();

function renderApp(){
  renderSidebar();
  const page = appData.pages.find(p => p.id === currentPageId);
  if(!page) return;
  
  document.getElementById('page-title').textContent = page.title;
  document.getElementById('page-subtitle').textContent = page.subtitle;
  renderCards(page.cards);
}

function renderSidebar(){
  const nav = document.getElementById('nav-sections');
  nav.innerHTML = '<div class="nav-section"><div class="nav-section-label"><span>Pages</span><button onclick="openAddPage()">＋</button></div></div>';
  const section = nav.querySelector('.nav-section');
  
  appData.pages.forEach(page => {
    const item = document.createElement('div');
    item.className = 'nav-item' + (page.id === currentPageId ? ' active' : '');
    item.innerHTML = `<span class="ni-emoji">${page.emoji}</span><span class="ni-label">${page.label}</span><span class="ni-actions"><button onclick="event.stopPropagation();editPage('${page.id}')">✏️</button><button onclick="event.stopPropagation();deletePage('${page.id}')">🗑️</button></span>`;
    item.addEventListener('click', () => { currentPageId = page.id; renderApp(); });
    section.appendChild(item);
  });
  
  const addBtn = document.createElement('button');
  addBtn.className = 'add-page-btn';
  addBtn.innerHTML = '＋ Add page';
  addBtn.onclick = openAddPage;
  section.appendChild(addBtn);
}

function renderCards(cards){
  const container = document.getElementById('cards-grid');
  container.innerHTML = '';
  
  // Organize cards by row
  const rows = {};
  cards.forEach(card => {
    const r = card.row || 0;
    if(!rows[r]) rows[r] = [];
    rows[r].push(card);
  });
  
  // Sort rows by key
  Object.keys(rows).sort((a,b) => a-b).forEach(rowKey => {
    const rowCards = rows[rowKey];
    const rowEl = document.createElement('div');
    rowEl.className = 'row';
    
    // Sort cards in row by column
    rowCards.sort((a,b) => (a.col || 0) - (b.col || 0));
    
    rowCards.forEach(card => {
      const cardEl = renderCard(card);
      rowEl.appendChild(cardEl);
    });
    
    container.appendChild(rowEl);
  });
}

function renderCard(card){
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.cardId = card.id;
  
  el.innerHTML = `
    <div class="card-header">
      <h3 class="card-title">${card.title}</h3>
    </div>
    <div class="card-body">
      <div class="card-content" contenteditable="true">${card.content}</div>
      <div class="card-actions">
        <button onclick="editCard('${card.id}')">✏️</button>
        <button onclick="deleteCard('${card.id}')" style="color:#e05c5c">🗑️</button>
      </div>
    </div>
  `;
  
  el.addEventListener('dragstart', e => {
    draggedCard = card;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  
  el.addEventListener('dragend', e => {
    draggedCard = null;
    el.classList.remove('dragging');
    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
  });
  
  return el;
}

function setupDropZones(){
  const page = appData.pages.find(p => p.id === currentPageId);
  if(!page) return;
  
  // Get all existing positions
  const positions = {};
  page.cards.forEach(c => {
    const r = c.row || 0;
    if(!positions[r]) positions[r] = new Set();
    positions[r].add(c.col || 0);
  });
  
  // Create drop zones for potential new columns and rows
  const rows = Object.keys(positions).map(Number).sort((a,b) => a-b);
  const maxRow = rows.length > 0 ? Math.max(...rows) : 0;
  const maxCol = Math.max(...Object.values(positions).map(cols => Math.max(...cols)), 0);
  
  // Add zones for new columns in existing rows
  rows.forEach(r => {
    const colsInRow = Array.from(positions[r]).sort((a,b) => a-b);
    const maxColInRow = colsInRow[colsInRow.length-1];
    
    // Zone after last column
    if(maxColInRow !== undefined){
      const zone = document.createElement('div');
      zone.className = 'drop-zone';
      zone.dataset.row = r;
      zone.dataset.col = maxColInRow + 1;
      zone.innerHTML = '＋ Column';
      setupZoneListeners(zone);
      document.querySelector(`.row`)?.appendChild(zone);
    }
  });
  
  // Zone for new row
  const bottomZone = document.createElement('div');
  bottomZone.className = 'drop-zone drop-zone-row';
  bottomZone.dataset.row = maxRow + 1;
  bottomZone.dataset.col = 0;
  bottomZone.innerHTML = '＋ Row';
  setupZoneListeners(bottomZone);
  document.getElementById('cards-grid').appendChild(bottomZone);
}

function setupZoneListeners(zone){
  zone.addEventListener('dragover', e => {
    e.preventDefault();
    if(!draggedCard) return;
    zone.classList.add('drag-over');
  });
  
  zone.addEventListener('dragleave', () => {
    zone.classList.remove('drag-over');
  });
  
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    
    if(!draggedCard) return;
    
    const newRow = parseInt(zone.dataset.row);
    const newCol = parseInt(zone.dataset.col);
    
    draggedCard.row = newRow;
    draggedCard.col = newCol;
    
    renderApp();
  });
}

function addCard(){
  document.getElementById('card-title-input').value = '';
  document.getElementById('card-content-input').value = '';
  openModal('modal-card');
}

function editCard(cardId){
  const page = appData.pages.find(p => p.id === currentPageId);
  const card = page.cards.find(c => c.id === cardId);
  if(!card) return;
  document.getElementById('card-title-input').value = card.title;
  document.getElementById('card-content-input').value = card.content;
  pendingCardEdit = cardId;
  openModal('modal-card');
}

function deleteCard(cardId){
  const page = appData.pages.find(p => p.id === currentPageId);
  page.cards = page.cards.filter(c => c.id !== cardId);
  renderApp();
}

document.getElementById('modal-card-save').onclick = () => {
  const title = document.getElementById('card-title-input').value.trim();
  const content = document.getElementById('card-content-input').value.trim();
  
  const page = appData.pages.find(p => p.id === currentPageId);
  if(!page) return;
  
  if(pendingCardEdit){
    const card = page.cards.find(c => c.id === pendingCardEdit);
    if(card){ card.title = title; card.content = content; }
    pendingCardEdit = null;
  } else {
    page.cards.push({id: 'c' + Date.now(), row: 0, col: page.cards.filter(c => c.row === 0).length, title, content});
  }
  closeModal('modal-card');
  renderApp();
};

function openAddPage(){
  document.getElementById('page-name-input').value = '';
  document.querySelector('#page-emoji-row .emoji-opt').classList.add('selected');
  openModal('modal-page');
}

function editPage(pageId){
  const page = appData.pages.find(p => p.id === pageId);
  if(!page) return;
  document.getElementById('page-name-input').value = page.label;
  document.querySelectorAll('#page-emoji-row .emoji-opt').forEach(el => {
    el.classList.toggle('selected', el.dataset.emoji === page.emoji);
  });
  pendingPageEdit = pageId;
  openModal('modal-page');
}

function deletePage(pageId){
  if(appData.pages.length <= 1) { alert('Cannot delete the only page'); return; }
  appData.pages = appData.pages.filter(p => p.id !== pageId);
  if(currentPageId === pageId) currentPageId = appData.pages[0].id;
  renderApp();
}

document.getElementById('modal-page-save').onclick = () => {
  const name = document.getElementById('page-name-input').value.trim();
  if(!name) return;
  const emoji = document.querySelector('#page-emoji-row .emoji-opt.selected').dataset.emoji;
  
  if(pendingPageEdit){
    const page = appData.pages.find(p => p.id === pendingPageEdit);
    if(page){ page.label = name; page.emoji = emoji; }
    pendingPageEdit = null;
  } else {
    appData.pages.push({
      id: 'p' + Date.now(),
      emoji,
      label: name,
      title: name,
      subtitle: '',
      cards: []
    });
  }
  closeModal('modal-page');
  renderApp();
};

function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target === m) m.classList.remove('show'); });
});

document.querySelectorAll('.emoji-row').forEach(row => {
  row.querySelectorAll('.emoji-opt').forEach(el => {
    el.addEventListener('click', function(){
      row.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
      this.classList.add('selected');
    });
  });
});

let pendingCardEdit = null;
let pendingPageEdit = null;

// Update drop zones after initial render
setTimeout(() => setupDropZones(), 100);
</script>
</body>
</html>
