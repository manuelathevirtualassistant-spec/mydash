<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Manuela · WAAB Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --purple:#3d2b8e;--purple-mid:#5c43b0;--purple-light:#ebe8f7;
  --purple-soft:#f3f1fb;--lavender:#d4cef5;--cream:#faf9f6;
  --text:#1a1630;--text-muted:#6b6588;--accent:#8b73e0;
  --green:#4caf85;--orange:#e8803a;--red:#e05c5c;--white:#fff;
  --sidebar-w:230px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

/* ── AUTH SCREEN ── */
#auth-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:var(--purple);
}
.auth-card{
  background:white;border-radius:24px;padding:48px 40px;
  text-align:center;max-width:380px;width:90%;
  box-shadow:0 24px 80px rgba(0,0,0,0.25);
}
.auth-logo{font-size:52px;margin-bottom:16px;}
.auth-card h1{font-family:'Playfair Display',serif;font-size:26px;color:var(--purple);margin-bottom:6px;}
.auth-card p{font-size:13px;color:var(--text-muted);margin-bottom:32px;}
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:13px 20px;border-radius:12px;border:2px solid #e8e4f7;
  background:white;color:var(--text);font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
}
.google-btn:hover{background:var(--purple-soft);border-color:var(--accent);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}

/* ── APP SHELL ── */
#app{display:none;}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;
  background:var(--purple);display:flex;flex-direction:column;
  padding:22px 16px;z-index:200;overflow-y:auto;
}
.logo-area{
  display:flex;align-items:center;gap:10px;
  margin-bottom:20px;padding-bottom:18px;
  border-bottom:1px solid rgba(255,255,255,0.13);
  cursor:pointer;
}
.logo-icon{
  width:42px;height:42px;border-radius:10px;
  background:rgba(255,255,255,0.12);display:flex;
  align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.logo-text{flex:1;min-width:0;}
.logo-text h2{font-family:'Playfair Display',serif;font-size:12px;color:white;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.logo-text span{font-size:10px;color:var(--lavender);font-weight:300;}

.nav-section{margin-bottom:6px;}
.nav-section-label{
  display:flex;align-items:center;justify-content:space-between;
  font-size:9px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--lavender);opacity:.6;padding:12px 8px 5px;font-weight:600;
}
.nav-section-label button{
  opacity:0;background:none;border:none;color:var(--lavender);
  cursor:pointer;font-size:14px;padding:0 2px;line-height:1;transition:opacity .2s;
}
.nav-section-label:hover button{opacity:.7;}
.nav-section-label button:hover{opacity:1!important;}

.nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border-radius:8px;cursor:pointer;color:rgba(255,255,255,.65);
  font-size:13px;transition:all .2s;position:relative;group:true;
}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.12);color:white;}
.nav-item .ni-emoji{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.nav-item .ni-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-item .ni-actions{
  display:none;gap:2px;align-items:center;flex-shrink:0;
}
.nav-item:hover .ni-actions{display:flex;}
.ni-actions button{
  background:none;border:none;color:rgba(255,255,255,.5);
  cursor:pointer;padding:2px 3px;font-size:12px;border-radius:4px;
  transition:color .15s;line-height:1;
}
.ni-actions button:hover{color:white;}

.add-page-btn{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:8px;cursor:pointer;color:rgba(255,255,255,.4);
  font-size:12px;border:1px dashed rgba(255,255,255,.2);
  background:none;width:100%;text-align:left;transition:all .2s;
  margin-top:4px;font-family:'DM Sans',sans-serif;
}
.add-page-btn:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.4);}

.role-box{
  margin-top:auto;padding:12px;background:rgba(255,255,255,.08);
  border-radius:10px;flex-shrink:0;
}
.role-box .rb-name{font-size:13px;color:white;font-weight:600;}
.role-box .rb-role{font-size:11px;color:var(--lavender);margin-top:2px;}
.role-box .rb-signout{
  margin-top:8px;font-size:11px;color:rgba(255,255,255,.4);
  cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;
  padding:0;transition:color .2s;
}
.role-box .rb-signout:hover{color:rgba(255,255,255,.8);}

/* ── MAIN ── */
.main{margin-left:var(--sidebar-w);padding:32px 36px;min-height:100vh;}

/* ── PAGE HEADER ── */
.page-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:28px;
}
.page-header-left h1{
  font-family:'Playfair Display',serif;font-size:28px;
  color:var(--purple);line-height:1;cursor:text;
}
.page-header-left h1 em{font-style:italic;color:var(--accent);}
.page-header-left p{margin-top:5px;font-size:13px;color:var(--text-muted);font-weight:300;cursor:text;}
.date-badge{background:var(--purple-light);border-radius:10px;padding:10px 16px;text-align:right;flex-shrink:0;}
.date-badge .day{font-family:'Playfair Display',serif;font-size:22px;color:var(--purple);font-weight:700;}
.date-badge .ds{font-size:11px;color:var(--text-muted);}

/* ── CARDS GRID ── */
.cards-area{display:flex;flex-direction:column;gap:20px;}
.cards-row{display:grid;gap:16px;}
.cards-row.cols-1{grid-template-columns:1fr;}
.cards-row.cols-2{grid-template-columns:1fr 1fr;}
.cards-row.cols-3{grid-template-columns:1fr 1fr 1fr;}
.cards-row.cols-4{grid-template-columns:repeat(4,1fr);}

/* ── CARD ── */
.card{
  background:white;border-radius:16px;padding:20px;
  border:1px solid rgba(61,43,142,.07);
  box-shadow:0 2px 12px rgba(61,43,142,.05);
  position:relative;transition:box-shadow .2s;
}
.card:hover{box-shadow:0 4px 20px rgba(61,43,142,.1);}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.card-emoji{font-size:16px;cursor:pointer;transition:transform .15s;}
.card-emoji:hover{transform:scale(1.2);}
.card-title-text{
  font-size:11px;font-weight:600;letter-spacing:1.1px;
  text-transform:uppercase;color:var(--accent);flex:1;cursor:text;
}
.card-title-text[contenteditable=true]:focus{outline:none;border-bottom:1px dashed var(--accent);}
.card-actions{
  display:none;gap:4px;align-items:center;
}
.card:hover .card-actions{display:flex;}
.card-actions button{
  background:none;border:none;color:var(--text-muted);
  cursor:pointer;padding:3px 5px;border-radius:6px;
  font-size:12px;transition:all .15s;line-height:1;
}
.card-actions button:hover{background:var(--purple-soft);color:var(--purple);}

.card-body{font-size:13px;color:var(--text);line-height:1.6;}
.card-body[contenteditable=true]{
  outline:none;min-height:40px;cursor:text;
}
.card-body[contenteditable=true]:focus{
  background:var(--purple-soft);border-radius:8px;padding:8px;margin:-8px;
}

/* ── STAT CARD ── */
.stat-card{
  background:white;border-radius:14px;padding:18px 20px;
  border:1px solid rgba(61,43,142,.07);position:relative;
}
.stat-card.dark{background:var(--purple);}
.stat-card .sc-label{font-size:11px;color:var(--text-muted);margin-bottom:5px;cursor:text;}
.stat-card.dark .sc-label{color:var(--lavender);}
.stat-card .sc-value{
  font-family:'Playfair Display',serif;font-size:26px;
  color:var(--purple);font-weight:700;cursor:text;
}
.stat-card.dark .sc-value{color:white;}
.stat-card .sc-sub{font-size:11px;color:var(--text-muted);margin-top:2px;cursor:text;}
.stat-card.dark .sc-sub{color:var(--lavender);}
.stat-card:hover .card-actions{display:flex;}
.stat-card .card-actions{position:absolute;top:8px;right:8px;}

/* ── FLOW CARD ── */
.flow-wrap{
  background:var(--purple);border-radius:20px;padding:24px;
  position:relative;
}
.flow-wrap:hover .card-actions{display:flex;}
.flow-wrap .card-actions{position:absolute;top:12px;right:12px;}
.flow-wrap .card-actions button{color:rgba(255,255,255,.5);}
.flow-wrap .card-actions button:hover{background:rgba(255,255,255,.15);color:white;}
.flow-heading{
  font-family:'Playfair Display',serif;font-size:18px;
  color:white;margin-bottom:16px;cursor:text;
}
.flow-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.ft{
  padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.55);background:transparent;transition:all .2s;
  font-family:'DM Sans',sans-serif;
}
.ft.active{background:white;color:var(--purple);border-color:white;font-weight:600;}
.flow-content{display:none;gap:8px;align-items:stretch;flex-wrap:wrap;}
.flow-content.active{display:flex;}
.fs{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  border-radius:12px;padding:14px;flex:1;min-width:100px;
}
.fs .sn{font-size:10px;font-weight:700;color:var(--lavender);margin-bottom:4px;}
.fs .st{font-size:13px;font-weight:600;color:white;margin-bottom:3px;}
.fs .sd{font-size:11px;color:rgba(255,255,255,.6);line-height:1.4;}
.fa{color:var(--lavender);font-size:16px;flex-shrink:0;align-self:center;}

/* ── ADD ROW / CARD BUTTONS ── */
.add-row-btn,.add-card-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px;border-radius:10px;cursor:pointer;
  border:1px dashed rgba(61,43,142,.2);background:none;
  color:var(--text-muted);font-size:12px;width:100%;
  transition:all .2s;font-family:'DM Sans',sans-serif;margin-top:6px;
}
.add-row-btn:hover,.add-card-btn:hover{
  border-color:var(--accent);color:var(--accent);background:var(--purple-soft);
}

/* ── SAVE INDICATOR ── */
#save-indicator{
  position:fixed;bottom:20px;right:20px;
  background:var(--purple);color:white;
  border-radius:20px;padding:8px 16px;font-size:12px;
  opacity:0;transition:opacity .3s;pointer-events:none;
  z-index:999;
}
#save-indicator.show{opacity:1;}

/* ── MODALS ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:center;justify-content:center;z-index:1000;
}
.modal-overlay.show{display:flex;}
.modal{
  background:white;border-radius:20px;padding:28px;
  width:min(420px,90vw);box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--purple);margin-bottom:20px;}
.modal label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px;}
.modal input,.modal textarea,.modal select{
  width:100%;padding:10px 13px;border:1.5px solid #e8e4f7;border-radius:10px;
  font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);
  outline:none;transition:border-color .2s;margin-bottom:16px;
}
.modal input:focus,.modal textarea:focus{border-color:var(--accent);}
.modal textarea{min-height:100px;resize:vertical;}
.modal .emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.modal .emoji-opt{
  width:36px;height:36px;border-radius:8px;border:2px solid transparent;
  background:var(--purple-soft);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.modal .emoji-opt:hover,.modal .emoji-opt.selected{border-color:var(--accent);background:var(--purple-light);}
.modal .custom-emoji{
  flex:1;min-width:80px;padding:6px 10px;border:1.5px solid #e8e4f7;
  border-radius:8px;font-size:14px;text-align:center;
  font-family:'DM Sans',sans-serif;outline:none;
}
.modal .custom-emoji:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}
.btn-cancel{
  padding:9px 20px;border-radius:10px;border:1.5px solid #e8e4f7;
  background:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-muted);
  transition:all .2s;
}
.btn-cancel:hover{border-color:var(--accent);color:var(--accent);}
.btn-confirm{
  padding:9px 20px;border-radius:10px;border:none;
  background:var(--purple);color:white;cursor:pointer;font-size:13px;
  font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;
}
.btn-confirm:hover{background:var(--purple-mid);}
.btn-danger{
  padding:9px 20px;border-radius:10px;border:none;
  background:#fde8e8;color:var(--red);cursor:pointer;font-size:13px;
  font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;
}
.btn-danger:hover{background:var(--red);color:white;}

/* ── FILE ATTACHMENT ── */
.card-files{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.file-chip{
  display:flex;align-items:center;gap:5px;background:var(--purple-soft);
  border-radius:20px;padding:3px 10px 3px 8px;font-size:11px;color:var(--purple);
  text-decoration:none;transition:background .15s;
}
.file-chip:hover{background:var(--purple-light);}
.file-chip .fc-icon{font-size:12px;}
.file-chip .fc-del{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:11px;padding:0 0 0 3px;line-height:1;
}
.file-chip .fc-del:hover{color:var(--red);}
.file-attach-btn{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:16px;padding:2px;line-height:1;transition:color .15s;
  display:none;
}
.card:hover .file-attach-btn,.stat-card:hover .file-attach-btn{display:inline;}
.file-attach-btn:hover{color:var(--accent);}
.file-input-hidden{display:none;}

/* ── INLINE EDIT STYLE ── */
[contenteditable=true]:empty:before{
  content:attr(data-placeholder);color:rgba(0,0,0,.25);pointer-events:none;
}

/* ── CHECKLIST ── */
.ck{list-style:none;display:flex;flex-direction:column;gap:8px;}
.ck li{display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.4;}
.ck li::before{content:'✦';color:var(--accent);font-size:9px;margin-top:3px;flex-shrink:0;}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;background:var(--purple);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;z-index:9999;
}
#loading .spin{
  width:36px;height:36px;border:3px solid rgba(255,255,255,.2);
  border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;
}
#loading p{color:rgba(255,255,255,.7);font-size:14px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MISC ── */
.hint{font-size:11px;color:var(--text-muted);font-style:italic;opacity:.7;margin-top:4px;}
.page-view{display:none;}
.page-view.active{display:block;}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p>Loading dashboard…</p></div>

<!-- AUTH -->
<div id="auth-screen" style="display:none;">
  <div class="auth-card">
    <div class="auth-logo">🧙‍♀️</div>
    <h1>Two Witches &amp; A Broom</h1>
    <p>Sign in to access your personal dashboard</p>
    <button class="google-btn" id="sign-in-btn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="sidebar" id="sidebar">
    <div class="logo-area" id="logo-area">
      <div class="logo-icon" id="logo-icon">🧙</div>
      <div class="logo-text">
        <h2 id="company-name">Two Witches &amp; A Broom</h2>
        <span id="company-sub">Cleaning Co.</span>
      </div>
    </div>
    <div id="nav-sections"></div>
    <div class="role-box">
      <div class="rb-name" id="user-name">—</div>
      <div class="rb-role" id="user-role">CX &amp; Sales VA</div>
      <button class="rb-signout" id="sign-out-btn">Sign out</button>
    </div>
  </nav>

  <main class="main" id="main-content">
    <div id="pages-container"></div>
  </main>
</div>

<!-- SAVE INDICATOR -->
<div id="save-indicator">💾 Saved</div>

<!-- MODAL: Add / Edit Page -->
<div class="modal-overlay" id="modal-page">
  <div class="modal">
    <h3 id="modal-page-title">New Page</h3>
    <label>Icon</label>
    <div class="emoji-row" id="page-emoji-row">
      <span class="emoji-opt selected" data-emoji="📋">📋</span>
      <span class="emoji-opt" data-emoji="💬">💬</span>
      <span class="emoji-opt" data-emoji="🧼">🧼</span>
      <span class="emoji-opt" data-emoji="💰">💰</span>
      <span class="emoji-opt" data-emoji="🏢">🏢</span>
      <span class="emoji-opt" data-emoji="⭐">⭐</span>
      <span class="emoji-opt" data-emoji="📅">📅</span>
      <span class="emoji-opt" data-emoji="🔄">🔄</span>
      <span class="emoji-opt" data-emoji="📊">📊</span>
      <input class="custom-emoji" placeholder="or type…" id="page-emoji-custom" maxlength="4"/>
    </div>
    <label>Page Name</label>
    <input type="text" id="page-name-input" placeholder="e.g. Sales Playbook"/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-page')">Cancel</button>
      <button class="btn-confirm" id="modal-page-save">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: Add Card -->
<div class="modal-overlay" id="modal-card">
  <div class="modal">
    <h3>Add Card</h3>
    <label>Icon</label>
    <div class="emoji-row" id="card-emoji-row">
      <span class="emoji-opt selected" data-emoji="📋">📋</span>
      <span class="emoji-opt" data-emoji="✅">✅</span>
      <span class="emoji-opt" data-emoji="🚫">🚫</span>
      <span class="emoji-opt" data-emoji="💡">💡</span>
      <span class="emoji-opt" data-emoji="📞">📞</span>
      <span class="emoji-opt" data-emoji="💬">💬</span>
      <span class="emoji-opt" data-emoji="⭐">⭐</span>
      <span class="emoji-opt" data-emoji="🔢">🔢</span>
      <input class="custom-emoji" placeholder="or type…" id="card-emoji-custom" maxlength="4"/>
    </div>
    <label>Card Title</label>
    <input type="text" id="card-title-input" placeholder="e.g. Daily Routine"/>
    <label>Type</label>
    <select id="card-type-input">
      <option value="text">Text / Notes</option>
      <option value="stat">Stat (big number)</option>
      <option value="checklist">Checklist</option>
    </select>
    <label>Content</label>
    <textarea id="card-content-input" placeholder="Write your content here…"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-card')">Cancel</button>
      <button class="btn-confirm" id="modal-card-save">Add Card</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirm Delete -->

// ── STATE ──
let appData = null;
let currentUser = null;
let currentPageId = null;
let saveTimer = null;
let pendingDelete = null;
let pendingEmojiTarget = null;
let pendingPageEdit = null;
let unsubSnapshot = null;

// ── AUTH ──
document.getElementById('sign-in-btn').addEventListener('click', async () => {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); }
  catch(e){ console.error(e); }
});
document.getElementById('sign-out-btn').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, async user => {
  document.getElementById('loading').style.display = 'none';
  if(user){
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-name').textContent = user.displayName || user.email;
    await loadData();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    if(unsubSnapshot){ unsubSnapshot(); unsubSnapshot = null; }
  }
});

// ── FIRESTORE ──
async function loadData(){
  const docRef = doc(db, 'dashboards', currentUser.uid);
  unsubSnapshot = onSnapshot(docRef, snap => {
    if(snap.exists()){
      appData = snap.data();
    } else {
      appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
      saveData();
    }
    renderApp();
  });
}

function saveData(){
  if(!currentUser || !appData) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try{
      await setDoc(doc(db,'dashboards',currentUser.uid), appData);
      showSaved();
    }catch(e){ console.error('Save error',e); }
  }, 800);
}

function showSaved(){
  const el = document.getElementById('save-indicator');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ── RENDER ──
function renderApp(){
  renderSidebar();
  const activePage = appData.pages.find(p=>p.id===currentPageId) || appData.pages[0];
  currentPageId = activePage.id;
  renderPage(activePage);
  // update logo
  document.getElementById('logo-icon').textContent = appData.meta.logoIcon||'🧙';
  document.getElementById('company-name').textContent = appData.meta.companyName||'';
  document.getElementById('company-sub').textContent = appData.meta.companySub||'';
}

function renderSidebar(){
  const container = document.getElementById('nav-sections');
  container.innerHTML = '';
  const section = document.createElement('div');
  section.className = 'nav-section';
  const lbl = document.createElement('div');
  lbl.className = 'nav-section-label';
  lbl.innerHTML = `<span>Pages</span><button title="Add page" onclick="openAddPage()">＋</button>`;
  section.appendChild(lbl);
  appData.pages.forEach(page => {
    const item = document.createElement('div');
    item.className = 'nav-item' + (page.id===currentPageId?' active':'');
    item.innerHTML = `
      <span class="ni-emoji">${page.emoji||'📋'}</span>
      <span class="ni-label">${page.label}</span>
      <span class="ni-actions">
        <button title="Edit" onclick="event.stopPropagation();openEditPage('${page.id}')">✏️</button>
        <button title="Delete" onclick="event.stopPropagation();confirmDelete('page','${page.id}')">🗑️</button>
      </span>`;
    item.addEventListener('click', ()=>{ currentPageId=page.id; renderApp(); });
    section.appendChild(item);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-page-btn';
  addBtn.innerHTML = '＋ Add page';
  addBtn.onclick = openAddPage;
  section.appendChild(addBtn);
  container.appendChild(section);
}

function renderPage(page){
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  const view = document.createElement('div');
  view.className = 'page-view active';

  // Header
  const header = document.createElement('div');
  header.className = 'page-header';
  header.innerHTML = `
    <div class="page-header-left">
      <h1 contenteditable="true" data-placeholder="Page Title" data-field="title" data-pageid="${page.id}">${page.title||''}</h1>
      <p contenteditable="true" data-placeholder="Subtitle…" data-field="subtitle" data-pageid="${page.id}">${page.subtitle||''}</p>
    </div>
    <div class="date-badge">
      <div class="day">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()]}</div>
      <div class="ds">${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
    </div>`;
  view.appendChild(header);

  // Inline editing for title/subtitle
  header.querySelectorAll('[contenteditable]').forEach(el => {
    el.addEventListener('blur', () => {
      const pg = appData.pages.find(p=>p.id===el.dataset.pageid);
      if(pg){ pg[el.dataset.field]=el.textContent.trim(); saveData(); }
    });
  });

  // Rows
  const cardsArea = document.createElement('div');
  cardsArea.className = 'cards-area';
  (page.rows||[]).forEach(row => {
    cardsArea.appendChild(renderRow(page.id, row));
  });

  // Add row
  const addRowBtn = document.createElement('button');
  addRowBtn.className = 'add-row-btn';
  addRowBtn.innerHTML = '＋ Add new row of cards';
  addRowBtn.onclick = () => addRow(page.id);
  cardsArea.appendChild(addRowBtn);

  view.appendChild(cardsArea);
  container.appendChild(view);
}

function renderRow(pageId, row){
  const rowEl = document.createElement('div');
  rowEl.className = 'cards-row cols-'+(row.cols||2);
  rowEl.dataset.rowid = row.id;

  // Column count selector
  const colCtrl = document.createElement('div');
  colCtrl.style.cssText='grid-column:1/-1;display:flex;align-items:center;gap:6px;margin-bottom:-8px;';
  colCtrl.innerHTML = `<span style="font-size:11px;color:var(--text-muted);">Columns:</span>
    ${[1,2,3,4].map(n=>`<button onclick="setRowCols('${pageId}','${row.id}',${n})" style="padding:3px 8px;border-radius:6px;border:1.5px solid ${row.cols===n?'var(--accent)':'#e8e4f7'};background:${row.cols===n?'var(--purple-soft)':'none'};font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;color:${row.cols===n?'var(--accent)':'var(--text-muted)'}">${n}</button>`).join('')}
    <button onclick="deleteRow('${pageId}','${row.id}')" style="margin-left:auto;font-size:11px;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:5px;" title="Delete row">🗑️ row</button>`;
  rowEl.appendChild(colCtrl);

  (row.cards||[]).forEach(card => {
    rowEl.appendChild(renderCard(pageId, row.id, card));
  });

  // Add card to row
  const addCardBtn = document.createElement('button');
  addCardBtn.className = 'add-card-btn';
  addCardBtn.innerHTML = '＋ Add card';
  addCardBtn.onclick = () => openAddCard(pageId, row.id);
  rowEl.appendChild(addCardBtn);

  return rowEl;
}

function renderCard(pageId, rowId, card){
  if(card.type==='stat') return renderStatCard(pageId, rowId, card);

  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.cardid = card.id;

  el.innerHTML = `
    <div class="card-header">
      <span class="card-emoji" title="Change icon" onclick="openEmojiPicker('card','${pageId}','${rowId}','${card.id}')">${card.emoji||'📋'}</span>
      <span class="card-title-text" contenteditable="true" data-placeholder="Title">${card.title||''}</span>
      <div class="card-actions">
        <button title="Toggle dark" onclick="toggleCardDark('${pageId}','${rowId}','${card.id}')">🌙</button>
        <button title="Delete" onclick="confirmDelete('card','${pageId}','${rowId}','${card.id}')">🗑️</button>
      </div>
    </div>
    <div class="card-body" contenteditable="true" data-placeholder="Write content here…">${escHtml(card.content||'').replace(/\n/g,'<br>')}</div>
    <div class="card-files" id="files-${card.id}"></div>
    <input type="file" class="file-input-hidden" id="file-input-${card.id}" multiple/>
    <button class="file-attach-btn" title="Attach file" onclick="document.getElementById('file-input-${card.id}').click()">📎</button>`;

  // Title editing
  const titleEl = el.querySelector('.card-title-text');
  titleEl.addEventListener('blur', ()=>{
    updateCardField(pageId,rowId,card.id,'title',titleEl.textContent.trim());
  });

  // Content editing
  const bodyEl = el.querySelector('.card-body');
  if(card.dark){ el.style.background='var(--purple)'; bodyEl.style.color='white'; titleEl.style.color='var(--lavender)'; }
  bodyEl.addEventListener('blur', ()=>{
    const txt = bodyEl.innerHTML.replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'');
    updateCardField(pageId,rowId,card.id,'content',txt);
  });

  // Files
  renderCardFiles(pageId, rowId, card, el);
  el.querySelector(`#file-input-${card.id}`).addEventListener('change', e => uploadFiles(e, pageId, rowId, card.id));

  return el;
}

function renderStatCard(pageId, rowId, card){
  const el = document.createElement('div');
  el.className = 'stat-card' + (card.dark?' dark':'');
  el.dataset.cardid = card.id;
  el.innerHTML = `
    <div class="card-actions" style="position:absolute;top:8px;right:8px;">
      <button title="Toggle dark" onclick="toggleCardDark('${pageId}','${rowId}','${card.id}')">🌙</button>
      <button title="Delete" onclick="confirmDelete('card','${pageId}','${rowId}','${card.id}')">🗑️</button>
    </div>
    <div class="sc-label" contenteditable="true" data-placeholder="Label">${card.label||''}</div>
    <div class="sc-value" contenteditable="true" data-placeholder="Value">${card.value||''}</div>
    <div class="sc-sub" contenteditable="true" data-placeholder="Subtitle">${card.sub||''}</div>
    <div class="card-files" id="files-${card.id}" style="margin-top:8px;"></div>
    <input type="file" class="file-input-hidden" id="file-input-${card.id}" multiple/>
    <button class="file-attach-btn" title="Attach file" onclick="document.getElementById('file-input-${card.id}').click()">📎</button>`;

  el.querySelectorAll('[contenteditable]').forEach(e=>{
    const f = e.classList.contains('sc-label')?'label':e.classList.contains('sc-value')?'value':'sub';
    e.addEventListener('blur',()=>updateCardField(pageId,rowId,card.id,f,e.textContent.trim()));
  });

  renderCardFiles(pageId, rowId, card, el);
  el.querySelector(`#file-input-${card.id}`).addEventListener('change', e => uploadFiles(e, pageId, rowId, card.id));
  return el;
}

function renderCardFiles(pageId, rowId, card, el){
  const filesEl = el.querySelector(`#files-${card.id}`);
  if(!filesEl) return;
  filesEl.innerHTML = '';
  (card.files||[]).forEach(f=>{
    const chip = document.createElement('a');
    chip.className='file-chip';
    chip.href=f.url;chip.target='_blank';
    chip.innerHTML=`<span class="fc-icon">📄</span>${f.name}<button class="fc-del" onclick="event.preventDefault();deleteFile('${pageId}','${rowId}','${card.id}','${f.storagePath}')">✕</button>`;
    filesEl.appendChild(chip);
  });
}

// ── CARD OPERATIONS ──
function updateCardField(pageId,rowId,cardId,field,val){
  const card = getCard(pageId,rowId,cardId);
  if(card){ card[field]=val; saveData(); }
}

function toggleCardDark(pageId,rowId,cardId){
  const card = getCard(pageId,rowId,cardId);
  if(card){ card.dark=!card.dark; saveData(); renderApp(); }
}

function getPage(pageId){ return appData.pages.find(p=>p.id===pageId); }
function getRow(pageId,rowId){ const pg=getPage(pageId); return pg?(pg.rows||[]).find(r=>r.id===rowId):null; }
function getCard(pageId,rowId,cardId){ const row=getRow(pageId,rowId); return row?(row.cards||[]).find(c=>c.id===cardId):null; }

// ── ROW OPERATIONS ──
window.setRowCols = (pageId,rowId,n)=>{
  const row=getRow(pageId,rowId);
  if(row){ row.cols=n; saveData(); renderApp(); }
};
window.deleteRow = (pageId,rowId)=>{
  const pg=getPage(pageId);
  if(pg){ pg.rows=(pg.rows||[]).filter(r=>r.id!==rowId); saveData(); renderApp(); }
};
function addRow(pageId){
  const pg=getPage(pageId);
  if(!pg) return;
  if(!pg.rows) pg.rows=[];
  pg.rows.push({id:'row-'+Date.now(),cols:2,cards:[]});
  saveData(); renderApp();
}

// ── PAGE OPERATIONS ──
window.openAddPage = ()=>{
  pendingPageEdit=null;
  document.getElementById('modal-page-title').textContent='New Page';
  document.getElementById('page-name-input').value='';
  setSelectedEmoji('page-emoji-row','📋');
  document.getElementById('page-emoji-custom').value='';
  openModal('modal-page');
};
window.openEditPage = (pageId)=>{
  const pg=getPage(pageId);
  if(!pg) return;
  pendingPageEdit=pageId;
  document.getElementById('modal-page-title').textContent='Edit Page';
  document.getElementById('page-name-input').value=pg.label;
  setSelectedEmoji('page-emoji-row',pg.emoji||'📋');
  openModal('modal-page');
};
document.getElementById('modal-page-save').onclick = ()=>{
  const name=document.getElementById('page-name-input').value.trim();
  if(!name) return;
  const emoji=getSelectedEmoji('page-emoji-row','page-emoji-custom');
  if(pendingPageEdit){
    const pg=getPage(pendingPageEdit);
    if(pg){ pg.label=name; pg.emoji=emoji; }
  } else {
    const newPage={
      id:'page-'+Date.now(),emoji,label:name,
      title:name,subtitle:'',rows:[]
    };
    appData.pages.push(newPage);
    currentPageId=newPage.id;
  }
  saveData(); closeModal('modal-page'); renderApp();
};

// ── ADD CARD ──
let pendingCardTarget=null;
window.openAddCard = (pageId,rowId)=>{
  pendingCardTarget={pageId,rowId};
  document.getElementById('card-title-input').value='';
  document.getElementById('card-content-input').value='';
  document.getElementById('card-type-input').value='text';
  setSelectedEmoji('card-emoji-row','📋');
  openModal('modal-card');
};
document.getElementById('modal-card-save').onclick = ()=>{
  if(!pendingCardTarget) return;
  const {pageId,rowId}=pendingCardTarget;
  const row=getRow(pageId,rowId);
  if(!row) return;
  const type=document.getElementById('card-type-input').value;
  const emoji=getSelectedEmoji('card-emoji-row','card-emoji-custom');
  const title=document.getElementById('card-title-input').value.trim();
  const content=document.getElementById('card-content-input').value.trim();
  const newCard={id:'card-'+Date.now(),type,emoji,title,content,files:[]};
  if(type==='stat'){
    newCard.label=title;newCard.value=content;newCard.sub='';delete newCard.title;delete newCard.content;
  }
  if(!row.cards) row.cards=[];
  row.cards.push(newCard);
  saveData(); closeModal('modal-card'); renderApp();
};

// ── DELETE ──
window.confirmDelete = (type,...args)=>{
  pendingDelete={type,args};
  openModal('modal-delete');
};
document.getElementById('modal-delete-confirm').onclick=()=>{
  if(!pendingDelete) return;
  const {type,args}=pendingDelete;
  if(type==='page'){
    appData.pages=appData.pages.filter(p=>p.id!==args[0]);
    if(currentPageId===args[0]) currentPageId=appData.pages[0]?.id;
  } else if(type==='card'){
    const [pageId,rowId,cardId]=args;
    const row=getRow(pageId,rowId);
    if(row) row.cards=(row.cards||[]).filter(c=>c.id!==cardId);
  }
  saveData(); closeModal('modal-delete'); renderApp();
};

// ── EMOJI PICKER ──
window.openEmojiPicker=(targetType,...args)=>{
  pendingEmojiTarget={targetType,args};
  openModal('modal-emoji');
};
document.getElementById('pick-emoji-confirm').onclick=()=>{
  if(!pendingEmojiTarget) return;
  const {targetType,args}=pendingEmojiTarget;
  const emoji=getSelectedEmoji('pick-emoji-row','pick-emoji-custom');
  if(targetType==='card'){
    const [pageId,rowId,cardId]=args;
    const card=getCard(pageId,rowId,cardId);
    if(card){ card.emoji=emoji; saveData(); }
  }
  closeModal('modal-emoji'); renderApp();
};
document.getElementById('pick-emoji-row').querySelectorAll('.emoji-opt').forEach(el=>{
  el.addEventListener('click',function(){
    document.querySelectorAll('#pick-emoji-row .emoji-opt').forEach(e=>e.classList.remove('selected'));
    this.classList.add('selected');
  });
});

// ── LOGO EDIT ──
document.getElementById('logo-area').addEventListener('dblclick',()=>{
  const name=prompt('Company name:',appData.meta.companyName);
  if(name!==null){ appData.meta.companyName=name; saveData(); renderApp(); }
});
document.getElementById('logo-icon').addEventListener('click',e=>{
  e.stopPropagation();
  const icon=prompt('Logo emoji:',appData.meta.logoIcon);
  if(icon){ appData.meta.logoIcon=icon; saveData(); renderApp(); }
});

// ── FILE UPLOAD ──
async function uploadFiles(e, pageId, rowId, cardId){
  const files=[...e.target.files];
  if(!files.length) return;
  for(const file of files){
    const path=`files/${currentUser.uid}/${cardId}/${Date.now()}_${file.name}`;
    const storageRef=ref(storage,path);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);
    const card=getCard(pageId,rowId,cardId);
    if(card){
      if(!card.files) card.files=[];
      card.files.push({name:file.name,url,storagePath:path});
      saveData();
    }
  }
  e.target.value='';
  renderApp();
}

window.deleteFile=async(pageId,rowId,cardId,storagePath)=>{
  const card=getCard(pageId,rowId,cardId);
  if(!card) return;
  card.files=(card.files||[]).filter(f=>f.storagePath!==storagePath);
  try{ await deleteObject(ref(storage,storagePath)); }catch(e){}
  saveData(); renderApp();
};

// ── MODAL HELPERS ──
window.openModal=(id)=>document.getElementById(id).classList.add('show');
window.closeModal=(id)=>document.getElementById(id).classList.remove('show');
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('show'); });
});

function getSelectedEmoji(rowId,customId){
  const custom=document.getElementById(customId).value.trim();
  if(custom) return custom;
  const sel=document.querySelector(`#${rowId} .emoji-opt.selected`);
  return sel?sel.dataset.emoji:'📋';
}
function setSelectedEmoji(rowId,emoji){
  const row=document.getElementById(rowId);
  row.querySelectorAll('.emoji-opt').forEach(e=>{
    e.classList.toggle('selected',e.dataset.emoji===emoji);
  });
}
document.querySelectorAll('.emoji-row').forEach(row=>{
  row.querySelectorAll('.emoji-opt').forEach(el=>{
    el.addEventListener('click',function(){
      row.querySelectorAll('.emoji-opt').forEach(e=>e.classList.remove('selected'));
      this.classList.add('selected');
    });
  });
});

// ── UTILS ──
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Expose globals
window.toggleCardDark=toggleCardDark;
window.addRow=addRow;
</script>
</body>
</html>
