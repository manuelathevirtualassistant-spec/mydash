<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Manuela · WAAB Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --purple:#3d2b8e;--purple-mid:#5c43b0;--purple-light:#ebe8f7;
  --purple-soft:#f3f1fb;--lavender:#d4cef5;--cream:#faf9f6;
  --text:#1a1630;--text-muted:#6b6588;--accent:#8b73e0;
  --green:#4caf85;--orange:#e8803a;--red:#e05c5c;--white:#fff;
  --sidebar-w:230px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

/* ── AUTH SCREEN ── */
#auth-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;background:var(--purple);
}
.auth-card{
  background:white;border-radius:24px;padding:48px 40px;
  text-align:center;max-width:380px;width:90%;
  box-shadow:0 24px 80px rgba(0,0,0,0.25);
}
.auth-logo{font-size:52px;margin-bottom:16px;}
.auth-card h1{font-family:'Playfair Display',serif;font-size:26px;color:var(--purple);margin-bottom:6px;}
.auth-card p{font-size:13px;color:var(--text-muted);margin-bottom:32px;}
.google-btn{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:13px 20px;border-radius:12px;border:2px solid #e8e4f7;
  background:white;color:var(--text);font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
}
.google-btn:hover{background:var(--purple-soft);border-color:var(--accent);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}

/* ── APP SHELL ── */
#app{display:none;}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;
  background:var(--purple);display:flex;flex-direction:column;
  padding:22px 16px;z-index:200;overflow-y:auto;
}
.logo-area{
  display:flex;align-items:center;gap:10px;
  margin-bottom:20px;padding-bottom:18px;
  border-bottom:1px solid rgba(255,255,255,0.13);
  cursor:pointer;
}
.logo-icon{
  width:42px;height:42px;border-radius:10px;
  background:rgba(255,255,255,0.12);display:flex;
  align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
}
.logo-text{flex:1;min-width:0;}
.logo-text h2{font-family:'Playfair Display',serif;font-size:12px;color:white;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.logo-text span{font-size:10px;color:var(--lavender);font-weight:300;}

.nav-section{margin-bottom:6px;}
.nav-section-label{
  display:flex;align-items:center;justify-content:space-between;
  font-size:9px;letter-spacing:1.4px;text-transform:uppercase;
  color:var(--lavender);opacity:.6;padding:12px 8px 5px;font-weight:600;
}
.nav-section-label button{
  opacity:0;background:none;border:none;color:var(--lavender);
  cursor:pointer;font-size:14px;padding:0 2px;line-height:1;transition:opacity .2s;
}
.nav-section-label:hover button{opacity:.7;}
.nav-section-label button:hover{opacity:1!important;}

.nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border-radius:8px;cursor:pointer;color:rgba(255,255,255,.65);
  font-size:13px;transition:all .2s;position:relative;
}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.12);color:white;}
.nav-item .ni-emoji{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.nav-item .ni-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-item .ni-actions{display:none;gap:2px;align-items:center;flex-shrink:0;}
.nav-item:hover .ni-actions{display:flex;}
.ni-actions button{
  background:none;border:none;color:rgba(255,255,255,.5);
  cursor:pointer;padding:2px 3px;font-size:12px;border-radius:4px;
  transition:color .15s;line-height:1;
}
.ni-actions button:hover{color:white;}

.add-page-btn{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:8px;cursor:pointer;color:rgba(255,255,255,.4);
  font-size:12px;border:1px dashed rgba(255,255,255,.2);
  background:none;width:100%;text-align:left;transition:all .2s;
  margin-top:4px;font-family:'DM Sans',sans-serif;
}
.add-page-btn:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.4);}

.role-box{
  margin-top:auto;padding:12px;background:rgba(255,255,255,.08);
  border-radius:10px;flex-shrink:0;
}
.role-box .rb-name{font-size:13px;color:white;font-weight:600;}
.role-box .rb-role{font-size:11px;color:var(--lavender);margin-top:2px;}
.role-box .rb-signout{
  margin-top:8px;font-size:11px;color:rgba(255,255,255,.4);
  cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;
  padding:0;transition:color .2s;
}
.role-box .rb-signout:hover{color:rgba(255,255,255,.8);}

/* ── MAIN ── */
.main{margin-left:var(--sidebar-w);padding:32px 36px;min-height:100vh;}

/* ── PAGE HEADER ── */
.page-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:28px;
}
.page-header-left h1{
  font-family:'Playfair Display',serif;font-size:28px;
  color:var(--purple);line-height:1;cursor:text;
}
.page-header-left p{margin-top:5px;font-size:13px;color:var(--text-muted);font-weight:300;cursor:text;}
.date-badge{background:var(--purple-light);border-radius:10px;padding:10px 16px;text-align:right;flex-shrink:0;}
.date-badge .day{font-family:'Playfair Display',serif;font-size:22px;color:var(--purple);font-weight:700;}
.date-badge .ds{font-size:11px;color:var(--text-muted);}

/* ── NOTION-STYLE LAYOUT ── */
.cards-area{display:flex;flex-direction:column;gap:0;}

/* Row = horizontal flex container of column groups */
.notion-row{
  display:flex;gap:0;align-items:stretch;
  position:relative;min-height:60px;
  border-radius:12px;
  transition:background .15s;
}
.notion-row.drag-over-row{background:rgba(139,115,224,0.06);}

/* Column inside a row */
.notion-col{
  flex:1;display:flex;flex-direction:column;gap:8px;
  padding:8px;min-width:0;
  position:relative;
}
.notion-col.drag-over-col{background:rgba(139,115,224,0.08);border-radius:10px;}

/* Row separator / add-row zone */
.row-gap{
  height:28px;display:flex;align-items:center;justify-content:center;
  position:relative;cursor:default;
}
.row-gap-line{
  width:100%;height:2px;background:transparent;border-radius:2px;
  transition:background .15s;
}
.row-gap:hover .row-gap-line,.row-gap.drop-active .row-gap-line{
  background:var(--accent);
}
.row-gap-add{
  opacity:0;position:absolute;left:50%;transform:translateX(-50%);
  background:var(--purple);color:white;border:none;border-radius:20px;
  padding:4px 14px;font-size:11px;font-family:'DM Sans',sans-serif;
  cursor:pointer;white-space:nowrap;transition:opacity .15s;
  pointer-events:none;
}
.row-gap:hover .row-gap-add{opacity:1;pointer-events:auto;}

/* Row controls */
.row-controls{
  display:none;position:absolute;top:8px;right:8px;
  gap:4px;z-index:10;
}
.notion-row:hover .row-controls{display:flex;}
.row-ctl-btn{
  background:white;border:1px solid #e8e4f7;color:var(--text-muted);
  border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;
  transition:all .15s;font-family:'DM Sans',sans-serif;line-height:1.4;
}
.row-ctl-btn:hover{background:var(--purple-soft);color:var(--purple);border-color:var(--accent);}

/* col divider drag handle */
.col-resizer{
  width:6px;flex-shrink:0;cursor:col-resize;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;
}
.notion-row:hover .col-resizer{opacity:1;}
.col-resizer-inner{width:2px;height:32px;background:var(--lavender);border-radius:2px;}

/* ── CARD (Current style) ── */
.card{
  background:white;border-radius:16px;padding:20px;
  border:1px solid rgba(61,43,142,.07);
  box-shadow:0 2px 12px rgba(61,43,142,.05);
  position:relative;transition:box-shadow .2s, opacity .2s, transform .2s;
  cursor:default;
}
.card:hover{box-shadow:0 4px 20px rgba(61,43,142,.1);}
.card.dragging{opacity:.4;transform:scale(.98);}
.card.drag-placeholder{
  border:2px dashed var(--accent)!important;background:var(--purple-soft)!important;
  box-shadow:none!important;opacity:.6;
}

.card-drag-handle{
  position:absolute;top:12px;left:-22px;
  width:18px;height:30px;display:flex;align-items:center;justify-content:center;
  opacity:0;cursor:grab;transition:opacity .15s;color:var(--text-muted);font-size:13px;
  border-radius:6px;
}
.card:hover .card-drag-handle{opacity:.6;}
.card-drag-handle:hover{opacity:1!important;background:var(--purple-soft);}
.card-drag-handle:active{cursor:grabbing;}

.card-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.card-emoji{font-size:16px;cursor:pointer;transition:transform .15s;}
.card-emoji:hover{transform:scale(1.2);}
.card-title-text{
  font-size:11px;font-weight:600;letter-spacing:1.1px;
  text-transform:uppercase;color:var(--accent);flex:1;cursor:text;
}
.card-title-text:focus{outline:none;border-bottom:1px dashed var(--accent);}
.card-actions{display:none;gap:4px;align-items:center;}
.card:hover .card-actions{display:flex;}
.card-actions button{
  background:none;border:none;color:var(--text-muted);
  cursor:pointer;padding:3px 5px;border-radius:6px;
  font-size:12px;transition:all .15s;line-height:1;
}
.card-actions button:hover{background:var(--purple-soft);color:var(--purple);}

.card-body{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.card-body:focus{
  outline:none;background:var(--purple-soft);border-radius:8px;padding:8px;margin:-8px;
}

/* ── TRELLO CARD (NEW) ── */
.trello-card{
  background:white;border-radius:12px;border:1px solid #e8e4f7;
  box-shadow:0 1px 3px rgba(61,43,142,.06);
  overflow:hidden;transition:all .2s;
  cursor:default;position:relative;
}
.trello-card:hover{box-shadow:0 4px 12px rgba(61,43,142,.12);}
.trello-card.dragging{opacity:.4;transform:scale(.98);}
.trello-card.drag-placeholder{
  border:2px dashed var(--accent)!important;background:var(--purple-soft)!important;
  box-shadow:none!important;opacity:.6;
}

.trello-card-drag-handle{
  position:absolute;top:8px;left:-22px;
  width:18px;height:30px;display:flex;align-items:center;justify-content:center;
  opacity:0;cursor:grab;transition:opacity .15s;color:var(--text-muted);font-size:13px;
  border-radius:6px;
}
.trello-card:hover .trello-card-drag-handle{opacity:.6;}
.trello-card-drag-handle:hover{opacity:1!important;background:var(--purple-soft);}
.trello-card-drag-handle:active{cursor:grabbing;}

.trello-card-header{
  background:var(--purple);color:white;padding:12px 14px;
  display:flex;align-items:center;gap:8px;justify-content:space-between;
}
.trello-card-title{
  font-size:13px;font-weight:600;flex:1;cursor:text;
  outline:none;background:transparent;color:white;border:none;
  font-family:'DM Sans',sans-serif;
}
.trello-card-title:focus{
  background:rgba(0,0,0,0.2);border-radius:6px;padding:2px 6px;margin:-2px -6px;
}
.trello-card-actions{display:flex;gap:2px;align-items:center;}
.trello-card-actions button{
  background:none;border:none;color:rgba(255,255,255,.6);
  cursor:pointer;padding:2px 4px;font-size:12px;border-radius:4px;
  transition:all .15s;line-height:1;
}
.trello-card-actions button:hover{background:rgba(0,0,0,0.2);color:white;}

.trello-card-body{
  padding:14px;font-size:13px;color:var(--text);line-height:1.5;
  white-space:pre-wrap;word-break:break-word;
  outline:none;
}
.trello-card-body:focus{
  background:var(--purple-soft);outline:1px solid var(--accent);border-radius:6px;
}

.trello-card-files{
  padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;
}

/* ── STAT CARD ── */
.stat-card{
  background:white;border-radius:14px;padding:18px 20px;
  border:1px solid rgba(61,43,142,.07);position:relative;
  transition:box-shadow .2s, opacity .2s, transform .2s;
  cursor:default;
}
.stat-card.dark{background:var(--purple);}
.stat-card.dragging{opacity:.4;transform:scale(.98);}
.stat-card.drag-placeholder{
  border:2px dashed var(--accent)!important;background:var(--purple-soft)!important;
  box-shadow:none!important;opacity:.6;
}
.stat-card .sc-label{font-size:11px;color:var(--text-muted);margin-bottom:5px;cursor:text;}
.stat-card.dark .sc-label{color:var(--lavender);}
.stat-card .sc-value{
  font-family:'Playfair Display',serif;font-size:26px;
  color:var(--purple);font-weight:700;cursor:text;
}
.stat-card.dark .sc-value{color:white;}
.stat-card .sc-sub{font-size:11px;color:var(--text-muted);margin-top:2px;cursor:text;}
.stat-card.dark .sc-sub{color:var(--lavender);}
.stat-card:hover .card-actions{display:flex;}
.stat-card .card-actions{position:absolute;top:8px;right:8px;}
.stat-card .card-drag-handle{position:absolute;top:12px;left:-22px;}
.stat-card:hover .card-drag-handle{opacity:.6;}

/* ── ADD CARD BUTTON ── */
.add-card-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px;border-radius:10px;cursor:pointer;
  border:1px dashed rgba(61,43,142,.2);background:none;
  color:var(--text-muted);font-size:12px;width:100%;
  transition:all .2s;font-family:'DM Sans',sans-serif;
  flex-shrink:0;
}
.add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--purple-soft);}

/* ── ADD ROW BUTTON (bottom) ── */
.add-row-bottom{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px;border-radius:10px;cursor:pointer;
  border:1px dashed rgba(61,43,142,.15);background:none;
  color:var(--text-muted);font-size:12px;width:100%;
  transition:all .2s;font-family:'DM Sans',sans-serif;
  margin-top:8px;
}
.add-row-bottom:hover{border-color:var(--accent);color:var(--accent);background:var(--purple-soft);}

/* ── SAVE INDICATOR ── */
#save-indicator{
  position:fixed;bottom:20px;right:20px;
  background:var(--purple);color:white;
  border-radius:20px;padding:8px 16px;font-size:12px;
  opacity:0;transition:opacity .3s;pointer-events:none;
  z-index:999;
}
#save-indicator.show{opacity:1;}

/* ── MODALS ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:none;align-items:center;justify-content:center;z-index:1000;
}
.modal-overlay.show{display:flex;}
.modal{
  background:white;border-radius:20px;padding:28px;
  width:min(420px,90vw);box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--purple);margin-bottom:20px;}
.modal label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px;}
.modal input,.modal textarea,.modal select{
  width:100%;padding:10px 13px;border:1.5px solid #e8e4f7;border-radius:10px;
  font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);
  outline:none;transition:border-color .2s;margin-bottom:16px;
}
.modal input:focus,.modal textarea:focus{border-color:var(--accent);}
.modal textarea{min-height:100px;resize:vertical;}
.modal .emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.modal .emoji-opt{
  width:36px;height:36px;border-radius:8px;border:2px solid transparent;
  background:var(--purple-soft);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.modal .emoji-opt:hover,.modal .emoji-opt.selected{border-color:var(--accent);background:var(--purple-light);}
.modal .custom-emoji{
  flex:1;min-width:80px;padding:6px 10px;border:1.5px solid #e8e4f7;
  border-radius:8px;font-size:14px;text-align:center;
  font-family:'DM Sans',sans-serif;outline:none;
}
.modal .custom-emoji:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}
.btn-cancel{
  padding:9px 20px;border-radius:10px;border:1.5px solid #e8e4f7;
  background:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-muted);
  transition:all .2s;
}
.btn-cancel:hover{border-color:var(--accent);color:var(--accent);}
.btn-confirm{
  padding:9px 20px;border-radius:10px;border:none;
  background:var(--purple);color:white;cursor:pointer;font-size:13px;
  font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;
}
.btn-confirm:hover{background:var(--purple-mid);}
.btn-danger{
  padding:9px 20px;border-radius:10px;border:none;
  background:#fde8e8;color:var(--red);cursor:pointer;font-size:13px;
  font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;
}
.btn-danger:hover{background:var(--red);color:white;}

/* ── FILE ATTACHMENT ── */
.card-files{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.file-chip{
  display:flex;align-items:center;gap:5px;background:var(--purple-soft);
  border-radius:20px;padding:3px 10px 3px 8px;font-size:11px;color:var(--purple);
  text-decoration:none;transition:background .15s;
}
.file-chip:hover{background:var(--purple-light);}
.file-chip .fc-icon{font-size:12px;}
.file-chip .fc-del{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:11px;padding:0 0 0 3px;line-height:1;
}
.file-chip .fc-del:hover{color:var(--red);}
.file-attach-btn{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:16px;padding:2px;line-height:1;transition:color .15s;
  display:none;
}
.card:hover .file-attach-btn,.stat-card:hover .file-attach-btn,.trello-card:hover .file-attach-btn{display:inline;}
.file-attach-btn:hover{color:var(--accent);}
.file-input-hidden{display:none;}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;background:var(--purple);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;z-index:9999;
}
#loading .spin{
  width:36px;height:36px;border:3px solid rgba(255,255,255,.2);
  border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;
}
#loading p{color:rgba(255,255,255,.7);font-size:14px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── DND GHOST ── */
.dnd-ghost{
  position:fixed;pointer-events:none;z-index:9000;
  opacity:.85;transform:rotate(2deg) scale(1.02);
  box-shadow:0 8px 30px rgba(0,0,0,.18);
  border-radius:16px;background:white;
  padding:16px;font-size:12px;color:var(--text);
  max-width:220px;
}
.page-view{display:none;}
.page-view.active{display:block;}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p>Loading dashboard…</p></div>

<!-- AUTH -->
<div id="auth-screen" style="display:none;">
  <div class="auth-card">
    <div class="auth-logo">🧙‍♀️</div>
    <h1>Two Witches &amp; A Broom</h1>

// ── STATE ──
let appData = null;
let currentUser = null;
let currentPageId = null;
let saveTimer = null;
let pendingDelete = null;
let pendingEmojiTarget = null;

let pendingCardTarget = null;

// ── AUTH ──
document.getElementById('sign-in-btn').addEventListener('click', async () => {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); } catch(e){ console.error(e); }
});
document.getElementById('sign-out-btn').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, async user => {
  document.getElementById('loading').style.display = 'none';
  if(user){
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-name').textContent = user.displayName || user.email;
    await loadData();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    if(unsubSnapshot){ unsubSnapshot(); unsubSnapshot = null; }
  }
});

// ── FIRESTORE ──
async function loadData(){
  const docRef = doc(db, 'dashboards', currentUser.uid);
  unsubSnapshot = onSnapshot(docRef, snap => {
    if(snap.exists()){
      appData = snap.data();
      migrateData();
    } else {
      appData = JSON.parse(JSON.stringify(DEFAULT_DATA));
      saveData();
    }
    renderApp();
  });
}

function migrateData(){
  for(const page of (appData.pages||[])){
    for(const row of (page.rows||[])){
      if(row.cards && !row.cols){
        const cols = [];
        let col = { id:'col-'+Date.now()+Math.random().toString(36).slice(2), cards:[] };
        row.cards.forEach((c,i)=>{
          col.cards.push(c);
          if((i+1) % Math.ceil(row.cards.length/(row.cols||2)) === 0){
            cols.push(col);
            col = { id:'col-'+Date.now()+Math.random().toString(36).slice(2), cards:[] };
          }
        });
        if(col.cards.length) cols.push(col);
        row.cols = cols;
        delete row.cards;
      }
    }
  }
}

function saveData(){
  if(!currentUser || !appData) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try{
      await setDoc(doc(db,'dashboards',currentUser.uid), appData);
      showSaved();
    }catch(e){ console.error('Save error',e); }
  }, 800);
}

function showSaved(){
  const el = document.getElementById('save-indicator');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ── RENDER ──
function renderApp(){
  renderSidebar();
  const activePage = appData.pages.find(p=>p.id===currentPageId) || appData.pages[0];
  currentPageId = activePage.id;
  renderPage(activePage);
  document.getElementById('logo-icon').textContent = appData.meta.logoIcon||'🧙';
  document.getElementById('company-name').textContent = appData.meta.companyName||'';
  document.getElementById('company-sub').textContent = appData.meta.companySub||'';
}

function renderSidebar(){
  const container = document.getElementById('nav-sections');
  container.innerHTML = '';
  const section = document.createElement('div');
  section.className = 'nav-section';
  const lbl = document.createElement('div');
  lbl.className = 'nav-section-label';
  lbl.innerHTML = `<span>Pages</span><button title="Add page" onclick="openAddPage()">＋</button>`;
  section.appendChild(lbl);
  appData.pages.forEach(page => {
    const item = document.createElement('div');
    item.className = 'nav-item' + (page.id===currentPageId?' active':'');
    item.innerHTML = `
      <span class="ni-emoji">${page.emoji||'📋'}</span>
      <span class="ni-label">${page.label}</span>
      <span class="ni-actions">
        <button title="Edit" onclick="event.stopPropagation();openEditPage('${page.id}')">✏️</button>
        <button title="Delete" onclick="event.stopPropagation();confirmDelete('page','${page.id}')">🗑️</button>
      </span>`;
    item.addEventListener('click', ()=>{ currentPageId=page.id; renderApp(); });
    section.appendChild(item);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-page-btn';
  addBtn.innerHTML = '＋ Add page';
  addBtn.onclick = openAddPage;
  section.appendChild(addBtn);
  container.appendChild(section);
}

function makeRowGap(pageId, insertIdx){
  const gap = document.createElement('div');
  gap.className = 'row-gap';

  return gap;
}

function renderRow(pageId, row){
  const rowEl = document.createElement('div');
  rowEl.className = 'notion-row';
  rowEl.dataset.rowid = row.id;

  const controls = document.createElement('div');
  controls.className = 'row-controls';
  controls.innerHTML = `
    <button class="row-ctl-btn" onclick="addColToRow('${pageId}','${row.id}')" title="Add column">＋ col</button>
    <button class="row-ctl-btn" onclick="confirmDelete('row','${pageId}','${row.id}')" title="Delete row" style="color:var(--red)">🗑️</button>`;
  rowEl.appendChild(controls);

  const cols = row.cols || [];
  cols.forEach((col, colIdx) => {
    if(colIdx > 0){
      const resizer = document.createElement('div');
      resizer.className = 'col-resizer';
      resizer.innerHTML = '<div class="col-resizer-inner"></div>';
      rowEl.appendChild(resizer);
    }
    rowEl.appendChild(renderCol(pageId, row.id, col));
  });

  return rowEl;
}

function renderCol(pageId, rowId, col){
  const colEl = document.createElement('div');
  colEl.className = 'notion-col';
  colEl.dataset.colid = col.id;

  (col.cards || []).forEach(card => {
    colEl.appendChild(renderCard(pageId, rowId, col.id, card));
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-card-btn';
  addBtn.innerHTML = '＋ Add card';
  addBtn.onclick = () => openAddCard(pageId, rowId, col.id);

  return colEl;
}

// ── DRAG AND DROP ──
let dragState = null;

function setupCardDrag(handle, cardEl){
  handle.addEventListener('dragstart', e => {
    e.stopPropagation();
    dragState = {
      cardId: cardEl.dataset.cardid,
      pageId: cardEl.dataset.pageId,
      rowId: cardEl.dataset.rowId,
      colId: cardEl.dataset.colId,
    };
    cardEl.classList.add('dragging');
    const ghost = document.getElementById('dnd-ghost');
    const titleEl = cardEl.querySelector('.card-title-text,.trello-card-title,.sc-label');
    ghost.textContent = titleEl ? (titleEl.textContent||titleEl.value||'Card') : 'Card';
    ghost.style.display = 'block';
    e.dataTransfer.setDragImage(ghost, 20, 20);
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(()=>ghost.style.display='none',0);
  });

  handle.addEventListener('dragend', e => {
    e.stopPropagation();
    cardEl.classList.remove('dragging');
    clearDndHighlights();
    dragState = null;
  });
}

function initDnd(pageId){
  const area = document.getElementById('cards-area');
  if(!area) return;

  area.addEventListener('dragover', e => {
    if(!dragState) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';

    const colEl = e.target.closest('.notion-col');
    if(!colEl) return;

    clearDndHighlights();
    colEl.classList.add('drag-over-col');

    const cards = [...colEl.querySelectorAll('.card,.stat-card,.trello-card')].filter(c=>!c.classList.contains('dragging'));
    let afterCard = null;
    for(const c of cards){
      const box = c.getBoundingClientRect();
      if(e.clientY < box.top + box.height/2){ break; }
      afterCard = c;
    }
    colEl._dropAfterCard = afterCard ? afterCard.dataset.cardid : null;
  });

  area.addEventListener('drop', e => {
    if(!dragState) return;
    e.preventDefault();

    const colEl = e.target.closest('.notion-col');
    if(!colEl) return;

    const targetColId = colEl.dataset.colid;
    const targetRowEl = colEl.closest('.notion-row');
    const targetRowId = targetRowEl ? targetRowEl.dataset.rowid : null;
    const afterCardId = colEl._dropAfterCard;

    if(!targetRowId || !targetColId) return;

    const page = getPage(pageId);
    let movedCard = null;
    for(const row of (page.rows||[])){
      for(const col of (row.cols||[])){
        const idx = (col.cards||[]).findIndex(c=>c.id===dragState.cardId);
        if(idx !== -1){
          movedCard = col.cards.splice(idx, 1)[0];
          break;
        }
      }
      if(movedCard) break;
    }
    if(!movedCard) return;

    const targetRow = (page.rows||[]).find(r=>r.id===targetRowId);
    if(!targetRow) return;
    const targetCol = (targetRow.cols||[]).find(c=>c.id===targetColId);
    if(!targetCol) return;
    if(!targetCol.cards) targetCol.cards=[];

    let insertIdx = targetCol.cards.length;
    if(afterCardId){
      const ai = targetCol.cards.findIndex(c=>c.id===afterCardId);
      if(ai !== -1) insertIdx = ai + 1;
    } else {
      insertIdx = 0;
    }
    targetCol.cards.splice(insertIdx, 0, movedCard);

    clearDndHighlights();
    saveData();
    renderApp();
  });

  area.addEventListener('dragleave', e => {
    if(!e.relatedTarget || !area.contains(e.relatedTarget)){
      clearDndHighlights();
    }
  });
}

function clearDndHighlights(){
  document.querySelectorAll('.drag-over-col,.drag-over-row,.drop-active').forEach(el=>{
    el.classList.remove('drag-over-col','drag-over-row','drop-active');
  });
}

// ── CARD / ROW / COL OPERATIONS ──
function updateCardField(pageId,rowId,colId,cardId,field,val){
  const card = getCard(pageId,rowId,colId,cardId);
  if(card){ card[field]=val; saveData(); }
}

window.toggleCardDark = (pageId,rowId,colId,cardId)=>{
  const card = getCard(pageId,rowId,colId,cardId);
  if(card){ card.dark=!card.dark; saveData(); renderApp(); }
};

function getPage(pageId){ return (appData.pages||[]).find(p=>p.id===pageId); }
function getRow(pageId,rowId){ const pg=getPage(pageId); return pg?(pg.rows||[]).find(r=>r.id===rowId):null; }
function getCol(pageId,rowId,colId){ const row=getRow(pageId,rowId); return row?(row.cols||[]).find(c=>c.id===colId):null; }
function getCard(pageId,rowId,colId,cardId){ const col=getCol(pageId,rowId,colId); return col?(col.cards||[]).find(c=>c.id===cardId):null; }

window.addColToRow = (pageId, rowId)=>{
  const row = getRow(pageId,rowId);
  if(!row) return;
  if(!row.cols) row.cols=[];
  row.cols.push({ id:'col-'+Date.now(), cards:[] });
  saveData(); renderApp();
};

window.deleteRow = (pageId,rowId)=>{ confirmDelete('row',pageId,rowId); };

function addRow(pageId){
  addRowAt(pageId, getPage(pageId)?.rows?.length||0);
}

window.addRowAt = (pageId, insertIdx)=>{
  const pg = getPage(pageId);
  if(!pg) return;
  if(!pg.rows) pg.rows=[];
  const newRow = {
    id:'row-'+Date.now(),
    cols:[
      { id:'col-'+Date.now()+'a', cards:[] },
      { id:'col-'+Date.now()+'b', cards:[] },
    ]
  };
  pg.rows.splice(insertIdx, 0, newRow);
  saveData(); renderApp();
};

// Update labels based on card type
function updateCardTypeFields(){
  const type = document.getElementById('card-type-input').value;
  const emojiLabel = document.getElementById('emoji-label');
  const titleLabel = document.getElementById('title-label');
  const contentLabel = document.getElementById('content-label');
  const emojiRow = document.getElementById('card-emoji-row');

  if(type === 'trello'){
    emojiLabel.style.display = 'none';
    emojiRow.style.display = 'none';
    titleLabel.textContent = 'Card Title';
    contentLabel.textContent = 'Description';
  } else {
    emojiLabel.style.display = 'block';
    emojiRow.style.display = 'flex';
    titleLabel.textContent = type === 'stat' ? 'Label' : 'Card Title';
    contentLabel.textContent = type === 'stat' ? 'Value' : 'Content';
  }
}

document.getElementById('card-type-input').addEventListener('change', updateCardTypeFields);

document.getElementById('modal-card-save').onclick = ()=>{
  if(!pendingCardTarget) return;
  const {pageId,rowId,colId} = pendingCardTarget;
  const col = getCol(pageId,rowId,colId);
  if(!col) return;
  const type = document.getElementById('card-type-input').value;
  const title = document.getElementById('card-title-input').value.trim();
  const content = document.getElementById('card-content-input').value.trim();
  
  let newCard;
  if(type === 'trello'){
    newCard = {
      id:'card-'+Date.now(),
      type:'trello',
      title: title || 'Untitled',
      content: content || '',
      files: []
    };
  } else if(type === 'stat'){
    const emoji = getSelectedEmoji('card-emoji-row','card-emoji-custom');
    newCard = {
      id:'card-'+Date.now(),
      type:'stat',
      emoji,
      label: title || 'Label',
      value: content || '',
      sub: '',
      files: []
    };
  } else {
    const emoji = getSelectedEmoji('card-emoji-row','card-emoji-custom');
    newCard = {
      id:'card-'+Date.now(),
      type:'text',
      emoji,
      title: title || 'Untitled',
      content: content || '',
      files: []
    };
  }
  
  if(!col.cards) col.cards=[];
  col.cards.push(newCard);
  saveData(); closeModal('modal-card'); renderApp();
};

// ── DELETE ──
window.confirmDelete = (type,...args)=>{
  pendingDelete = {type,args};
  openModal('modal-delete');
};
document.getElementById('modal-delete-confirm').onclick = ()=>{
  if(!pendingDelete) return;
  const {type,args} = pendingDelete;
  if(type==='page'){
    appData.pages = appData.pages.filter(p=>p.id!==args[0]);
    if(currentPageId===args[0]) currentPageId = appData.pages[0]?.id;
  } else if(type==='row'){
    const [pageId,rowId] = args;
    const pg = getPage(pageId);
    if(pg) pg.rows=(pg.rows||[]).filter(r=>r.id!==rowId);
  } else if(type==='card'){
    const [pageId,rowId,colId,cardId] = args;
    const col = getCol(pageId,rowId,colId);
    if(col) col.cards=(col.cards||[]).filter(c=>c.id!==cardId);
  }
  saveData(); closeModal('modal-delete'); renderApp();
};

};
document.getElementById('pick-emoji-confirm').onclick = ()=>{
  if(!pendingEmojiTarget) return;
  const {targetType,args} = pendingEmojiTarget;
  const emoji = getSelectedEmoji('pick-emoji-row','pick-emoji-custom');
  if(targetType==='card'){
    const [pageId,rowId,colId,cardId] = args;
    const card = getCard(pageId,rowId,colId,cardId);
    if(card){ card.emoji=emoji; saveData(); }
  }
  closeModal('modal-emoji'); renderApp();
};
document.getElementById('pick-emoji-row').querySelectorAll('.emoji-opt').forEach(el=>{
  el.addEventListener('click',function(){
    document.querySelectorAll('#pick-emoji-row .emoji-opt').forEach(e=>e.classList.remove('selected'));
    this.classList.add('selected');
  });
});

// ── LOGO EDIT ──
document.getElementById('logo-area').addEventListener('dblclick',()=>{
  const name = prompt('Company name:',appData.meta.companyName);
  if(name!==null){ appData.meta.companyName=name; saveData(); renderApp(); }
});
document.getElementById('logo-icon').addEventListener('click',e=>{
  e.stopPropagation();
  const icon = prompt('Logo emoji:',appData.meta.logoIcon);
  if(icon){ appData.meta.logoIcon=icon; saveData(); renderApp(); }
});

// ── FILE UPLOAD ──
async function uploadFiles(e, pageId, rowId, colId, cardId){
  const files = [...e.target.files];
  if(!files.length) return;
  for(const file of files){
    const path = `files/${currentUser.uid}/${cardId}/${Date.now()}_${file.name}`;
    const storageRef = ref(storage,path);
    await uploadBytes(storageRef,file);
    const url = await getDownloadURL(storageRef);
    const card = getCard(pageId,rowId,colId,cardId);
    if(card){
      if(!card.files) card.files=[];
      card.files.push({name:file.name,url,storagePath:path});
      saveData();
    }
  }
  e.target.value = '';
  renderApp();
}

window.deleteFile = async(pageId,rowId,colId,cardId,storagePath)=>{
  const card = getCard(pageId,rowId,colId,cardId);
  if(!card) return;
  card.files=(card.files||[]).filter(f=>f.storagePath!==storagePath);
  try{ await deleteObject(ref(storage,storagePath)); }catch(e){}
  saveData(); renderApp();
};

// ── MODAL HELPERS ──
window.openModal = id=>document.getElementById(id).classList.add('show');
window.closeModal = id=>document.getElementById(id).classList.remove('show');
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('show'); });
});

function getSelectedEmoji(rowId,customId){
  const custom = document.getElementById(customId).value.trim();
  if(custom) return custom;
  const sel = document.querySelector(`#${rowId} .emoji-opt.selected`);
  return sel ? sel.dataset.emoji : '📋';
}
function setSelectedEmoji(rowId,emoji){
  document.querySelectorAll(`#${rowId} .emoji-opt`).forEach(e=>{
    e.classList.toggle('selected',e.dataset.emoji===emoji);
  });
}
document.querySelectorAll('.emoji-row').forEach(row=>{
  row.querySelectorAll('.emoji-opt').forEach(el=>{
    el.addEventListener('click',function(){
      row.querySelectorAll('.emoji-opt').forEach(e=>e.classList.remove('selected'));
      this.classList.add('selected');
    });
  });
});
</script>
