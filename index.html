<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Manuela · WAAB Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --purple:#3d2b8e;--purple-mid:#5c43b0;--purple-light:#ebe8f7;
  --purple-soft:#f3f1fb;--lavender:#d4cef5;--cream:#faf9f6;
  --text:#1a1630;--text-muted:#6b6588;--accent:#8b73e0;
  --green:#4caf85;--orange:#e8803a;--red:#e05c5c;--white:#fff;
  --sidebar-w:230px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--purple);}
.auth-card{background:white;border-radius:24px;padding:48px 40px;text-align:center;max-width:380px;width:90%;box-shadow:0 24px 80px rgba(0,0,0,0.25);}
.auth-logo{font-size:52px;margin-bottom:16px;}
.auth-card h1{font-family:'Playfair Display',serif;font-size:26px;color:var(--purple);margin-bottom:6px;}
.auth-card p{font-size:13px;color:var(--text-muted);margin-bottom:32px;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;border-radius:12px;border:2px solid #e8e4f7;background:white;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;}
.google-btn:hover{background:var(--purple-soft);border-color:var(--accent);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}

#app{display:none;}

.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--purple);display:flex;flex-direction:column;padding:22px 16px;z-index:200;overflow-y:auto;}
.logo-area{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.13);cursor:pointer;}
.logo-icon{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.logo-text{flex:1;min-width:0;}
.logo-text h2{font-family:'Playfair Display',serif;font-size:12px;color:white;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.logo-text span{font-size:10px;color:var(--lavender);font-weight:300;}
.nav-section{margin-bottom:6px;}
.nav-section-label{display:flex;align-items:center;justify-content:space-between;font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--lavender);opacity:.6;padding:12px 8px 5px;font-weight:600;}
.nav-section-label button{opacity:0;background:none;border:none;color:var(--lavender);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;transition:opacity .2s;}
.nav-section-label:hover button{opacity:.7;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;transition:all .2s;position:relative;}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.12);color:white;}
.nav-item .ni-emoji{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.nav-item .ni-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-item .ni-actions{display:none;gap:2px;align-items:center;flex-shrink:0;}
.nav-item:hover .ni-actions{display:flex;}
.ni-actions button{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:2px 3px;font-size:12px;border-radius:4px;transition:color .15s;line-height:1;}
.add-page-btn{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.4);font-size:12px;border:1px dashed rgba(255,255,255,.2);background:none;width:100%;text-align:left;transition:all .2s;margin-top:4px;font-family:'DM Sans',sans-serif;}
.add-page-btn:hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.4);}
.role-box{margin-top:auto;padding:12px;background:rgba(255,255,255,.08);border-radius:10px;flex-shrink:0;}
.role-box .rb-name{font-size:13px;color:white;font-weight:600;}
.role-box .rb-role{font-size:11px;color:var(--lavender);margin-top:2px;}
.role-box .rb-signout{margin-top:8px;font-size:11px;color:rgba(255,255,255,.4);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;transition:color .2s;}
.role-box .rb-signout:hover{color:rgba(255,255,255,.8);}

.main{margin-left:var(--sidebar-w);padding:32px 36px;min-height:100vh;}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;}
.page-header-left h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--purple);line-height:1;cursor:text;}
.page-header-left p{margin-top:5px;font-size:13px;color:var(--text-muted);font-weight:300;cursor:text;}
.date-badge{background:var(--purple-light);border-radius:10px;padding:10px 16px;text-align:right;flex-shrink:0;}
.date-badge .day{font-family:'Playfair Display',serif;font-size:22px;color:var(--purple);font-weight:700;}
.date-badge .ds{font-size:11px;color:var(--text-muted);}

.cards-area{display:flex;flex-direction:column;gap:0;}
.notion-row{display:flex;gap:0;align-items:stretch;position:relative;min-height:60px;border-radius:12px;transition:background .15s;}
.notion-row.drag-over-row{background:rgba(139,115,224,0.06);}
.notion-col{flex:1;display:flex;flex-direction:column;gap:8px;padding:8px;min-width:0;position:relative;}
.notion-col.drag-over-col{background:rgba(139,115,224,0.08);border-radius:10px;}
.row-gap{height:28px;display:flex;align-items:center;justify-content:center;position:relative;cursor:default;}
.row-gap-line{width:100%;height:2px;background:transparent;border-radius:2px;transition:background .15s;}
.row-gap:hover .row-gap-line,.row-gap.drop-active .row-gap-line{background:var(--accent);}
.row-gap-add{opacity:0;position:absolute;left:50%;transform:translateX(-50%);background:var(--purple);color:white;border:none;border-radius:20px;padding:4px 14px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .15s;pointer-events:none;}
.row-gap:hover .row-gap-add{opacity:1;pointer-events:auto;}
.row-controls{display:none;position:absolute;top:8px;right:8px;gap:4px;z-index:10;}
.notion-row:hover .row-controls{display:flex;}
.row-ctl-btn{background:white;border:1px solid #e8e4f7;color:var(--text-muted);border-radius:6px;padding:3px 7px;font-size:11px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;line-height:1.4;}
.row-ctl-btn:hover{background:var(--purple-soft);color:var(--purple);border-color:var(--accent);}
.col-resizer{width:6px;flex-shrink:0;cursor:col-resize;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.notion-row:hover .col-resizer{opacity:1;}
.col-resizer-inner{width:2px;height:32px;background:var(--lavender);border-radius:2px;}

.card{background:white;border-radius:16px;padding:20px;border:1px solid rgba(61,43,142,.07);box-shadow:0 2px 12px rgba(61,43,142,.05);position:relative;transition:box-shadow .2s, opacity .2s, transform .2s;cursor:default;}
.card:hover{box-shadow:0 4px 20px rgba(61,43,142,.1);}
.card.dragging{opacity:.4;transform:scale(.98);}
.card.drag-placeholder{border:2px dashed var(--accent)!important;background:var(--purple-soft)!important;box-shadow:none!important;opacity:.6;}
.card-drag-handle{position:absolute;top:12px;left:-22px;width:18px;height:30px;display:flex;align-items:center;justify-content:center;opacity:0;cursor:grab;transition:opacity .15s;color:var(--text-muted);font-size:13px;border-radius:6px;}
.card:hover .card-drag-handle{opacity:.6;}
.card-drag-handle:hover{opacity:1!important;background:var(--purple-soft);}
.card-drag-handle:active{cursor:grabbing;}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.card-emoji{font-size:16px;cursor:pointer;transition:transform .15s;}
.card-emoji:hover{transform:scale(1.2);}
.card-title-text{font-size:11px;font-weight:600;letter-spacing:1.1px;text-transform:uppercase;color:var(--accent);flex:1;cursor:text;}
.card-title-text:focus{outline:none;border-bottom:1px dashed var(--accent);}
.card-actions{display:none;gap:4px;align-items:center;}
.card:hover .card-actions{display:flex;}
.card-actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:3px 5px;border-radius:6px;font-size:12px;transition:all .15s;line-height:1;}
.card-actions button:hover{background:var(--purple-soft);color:var(--purple);}
.card-body{font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.card-body:focus{outline:none;background:var(--purple-soft);border-radius:8px;padding:8px;margin:-8px;}

.trello-card{background:white;border-radius:12px;border:1px solid #e8e4f7;box-shadow:0 1px 3px rgba(61,43,142,.06);overflow:hidden;transition:all .2s;cursor:default;position:relative;}
.trello-card:hover{box-shadow:0 4px 12px rgba(61,43,142,.12);}
.trello-card.dragging{opacity:.4;transform:scale(.98);}
.trello-card.drag-placeholder{border:2px dashed var(--accent)!important;background:var(--purple-soft)!important;box-shadow:none!important;opacity:.6;}
.trello-card-drag-handle{position:absolute;top:8px;left:-22px;width:18px;height:30px;display:flex;align-items:center;justify-content:center;opacity:0;cursor:grab;transition:opacity .15s;color:var(--text-muted);font-size:13px;border-radius:6px;}
.trello-card:hover .trello-card-drag-handle{opacity:.6;}
.trello-card-drag-handle:hover{opacity:1!important;background:var(--purple-soft);}
.trello-card-drag-handle:active{cursor:grabbing;}
.trello-card-header{background:var(--purple);color:white;padding:12px 14px;display:flex;align-items:center;gap:8px;justify-content:space-between;}
.trello-card-title{font-size:13px;font-weight:600;flex:1;cursor:text;outline:none;background:transparent;color:white;border:none;font-family:'DM Sans',sans-serif;}
.trello-card-title:focus{background:rgba(0,0,0,0.2);border-radius:6px;padding:2px 6px;margin:-2px -6px;}
.trello-card-actions{display:flex;gap:2px;align-items:center;}
.trello-card-actions button{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;padding:2px 4px;font-size:12px;border-radius:4px;transition:all .15s;line-height:1;}
.trello-card-actions button:hover{background:rgba(0,0,0,0.2);color:white;}
.trello-card-body{padding:14px;font-size:13px;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word;outline:none;}
.trello-card-body:focus{background:var(--purple-soft);outline:1px solid var(--accent);border-radius:6px;}

.trello-ext-card{background:white;border-radius:12px;border:1px solid #e8e4f7;box-shadow:0 1px 3px rgba(61,43,142,.06);overflow:hidden;transition:all .2s;cursor:default;position:relative;}
.trello-ext-card:hover{box-shadow:0 4px 12px rgba(61,43,142,.12);}
.trello-ext-card.dragging{opacity:.4;transform:scale(.98);}
.trello-ext-card.drag-placeholder{border:2px dashed var(--accent)!important;background:var(--purple-soft)!important;box-shadow:none!important;opacity:.6;}
.trello-ext-card-drag-handle{position:absolute;top:8px;left:-22px;width:18px;height:30px;display:flex;align-items:center;justify-content:center;opacity:0;cursor:grab;transition:opacity .15s;color:var(--text-muted);font-size:13px;border-radius:6px;}
.trello-ext-card:hover .trello-ext-card-drag-handle{opacity:.6;}
.trello-ext-card-drag-handle:hover{opacity:1!important;background:var(--purple-soft);}
.trello-ext-card-drag-handle:active{cursor:grabbing;}
.trello-ext-card-header{padding:14px;border-bottom:1px solid #e8e4f7;display:flex;align-items:center;gap:8px;justify-content:space-between;}
.trello-ext-card-title{font-size:14px;font-weight:600;flex:1;cursor:text;outline:none;background:transparent;color:var(--text);border:none;font-family:'DM Sans',sans-serif;}
.trello-ext-card-title:focus{background:var(--purple-soft);border-radius:6px;padding:2px 6px;margin:-2px -6px;}
.trello-ext-card-actions{display:flex;gap:2px;align-items:center;}
.trello-ext-card-actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:2px 4px;font-size:12px;border-radius:4px;transition:all .15s;line-height:1;}
.trello-ext-card-actions button:hover{background:var(--purple-soft);color:var(--purple);}
.trello-ext-card-body{padding:14px;font-size:13px;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word;outline:none;}
.trello-ext-card-body:focus{background:var(--purple-soft);outline:1px solid var(--accent);border-radius:6px;}

.stat-card{background:white;border-radius:14px;padding:18px 20px;border:1px solid rgba(61,43,142,.07);position:relative;transition:box-shadow .2s, opacity .2s, transform .2s;cursor:default;}
.stat-card.dark{background:var(--purple);}
.stat-card.dragging{opacity:.4;transform:scale(.98);}
.stat-card.drag-placeholder{border:2px dashed var(--accent)!important;background:var(--purple-soft)!important;box-shadow:none!important;opacity:.6;}
.stat-card .sc-label{font-size:11px;color:var(--text-muted);margin-bottom:5px;cursor:text;}
.stat-card.dark .sc-label{color:var(--lavender);}
.stat-card .sc-value{font-family:'Playfair Display',serif;font-size:26px;color:var(--purple);font-weight:700;cursor:text;}
.stat-card.dark .sc-value{color:white;}
.stat-card .sc-sub{font-size:11px;color:var(--text-muted);margin-top:2px;cursor:text;}
.stat-card.dark .sc-sub{color:var(--lavender);}
.stat-card:hover .card-actions{display:flex;}
.stat-card .card-actions{position:absolute;top:8px;right:8px;}
.stat-card .card-drag-handle{position:absolute;top:12px;left:-22px;}
.stat-card:hover .card-drag-handle{opacity:.6;}

.add-card-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border-radius:10px;cursor:pointer;border:1px dashed rgba(61,43,142,.2);background:none;color:var(--text-muted);font-size:12px;width:100%;transition:all .2s;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.add-card-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--purple-soft);}
.add-row-bottom{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;cursor:pointer;border:1px dashed rgba(61,43,142,.15);background:none;color:var(--text-muted);font-size:12px;width:100%;transition:all .2s;font-family:'DM Sans',sans-serif;margin-top:8px;}
.add-row-bottom:hover{border-color:var(--accent);color:var(--accent);background:var(--purple-soft);}

#save-indicator{position:fixed;bottom:20px;right:20px;background:var(--purple);color:white;border-radius:20px;padding:8px 16px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
#save-indicator.show{opacity:1;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:20px;padding:28px;width:min(420px,90vw);box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--purple);margin-bottom:20px;}
.modal label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px;}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 13px;border:1.5px solid #e8e4f7;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:16px;}
.modal input:focus,.modal textarea:focus{border-color:var(--accent);}
.modal textarea{min-height:100px;resize:vertical;}
.modal .emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.modal .emoji-opt{width:36px;height:36px;border-radius:8px;border:2px solid transparent;background:var(--purple-soft);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal .emoji-opt:hover,.modal .emoji-opt.selected{border-color:var(--accent);background:var(--purple-light);}
.modal .custom-emoji{flex:1;min-width:80px;padding:6px 10px;border:1.5px solid #e8e4f7;border-radius:8px;font-size:14px;text-align:center;font-family:'DM Sans',sans-serif;outline:none;}
.modal .custom-emoji:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}
.btn-cancel{padding:9px 20px;border-radius:10px;border:1.5px solid #e8e4f7;background:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-muted);transition:all .2s;}
.btn-cancel:hover{border-color:var(--accent);color:var(--accent);}
.btn-confirm{padding:9px 20px;border-radius:10px;border:none;background:var(--purple);color:white;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;}
.btn-confirm:hover{background:var(--purple-mid);}
.btn-danger{padding:9px 20px;border-radius:10px;border:none;background:#fde8e8;color:var(--red);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;}
.btn-danger:hover{background:var(--red);color:white;}

#loading{position:fixed;inset:0;background:var(--purple);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999;}
#loading .spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;}
#loading p{color:rgba(255,255,255,.7);font-size:14px;}
@keyframes spin{to{transform:rotate(360deg);}}

.dnd-ghost{position:fixed;pointer-events:none;z-index:9000;opacity:.85;transform:rotate(2deg) scale(1.02);box-shadow:0 8px 30px rgba(0,0,0,.18);border-radius:16px;background:white;padding:16px;font-size:12px;color:var(--text);max-width:220px;}
.page-view{display:none;}
.page-view.active{display:block;}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p>Loading...</p></div>

<div id="auth-screen" style="display:none;">
  <div class="auth-card">
    <div class="auth-logo">🧙‍♀️</div>
    <h1>WAAB Dashboard</h1>
    <p>Sign in with Google</p>
    <button class="google-btn" id="sign-in-btn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in
    </button>
  </div>
</div>

<div id="app">
  <nav class="sidebar">
    <div class="logo-area">
      <div class="logo-icon">🧙</div>
      <div class="logo-text">
        <h2>Dashboard</h2>
      </div>
    </div>
    <div id="nav-sections"></div>
    <div class="role-box">
      <div class="rb-name" id="user-name">User</div>
      <button class="rb-signout" id="sign-out-btn">Sign out</button>
    </div>
  </nav>
  <main class="main">
    <div id="pages-container"></div>
  </main>
</div>

<div id="save-indicator">💾 Saved</div>

<div class="modal-overlay" id="modal-page">
  <div class="modal">
    <h3>New Page</h3>
    <label>Page Name</label>
    <input type="text" id="page-name-input" placeholder="Name..."/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-page')">Cancel</button>
      <button class="btn-confirm" id="modal-page-save">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-card">
  <div class="modal">
    <h3>Add Card</h3>
    <label>Type</label>
    <select id="card-type-input">
      <option value="text">Text (with emoji)</option>
      <option value="stat">Stat (big number)</option>
      <option value="trello">Trello (header title)</option>
      <option value="trello-ext">Trello Extended (title + content)</option>
    </select>
    <label id="emoji-label">Icon</label>
    <div class="emoji-row" id="card-emoji-row">
      <span class="emoji-opt selected" data-emoji="📋">📋</span>
      <span class="emoji-opt" data-emoji="✅">✅</span>
      <span class="emoji-opt" data-emoji="🚫">🚫</span>
      <span class="emoji-opt" data-emoji="💡">💡</span>
    </div>
    <label id="title-label">Title</label>
    <input type="text" id="card-title-input" placeholder="Title"/>
    <label id="content-label">Content</label>
    <textarea id="card-content-input" placeholder="Content..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-card')">Cancel</button>
      <button class="btn-confirm" id="modal-card-save">Add</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-delete">
  <div class="modal">
    <h3>Delete?</h3>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:24px;">This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-delete')">Cancel</button>
      <button class="btn-danger" id="modal-delete-confirm">Delete</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyBRYnwBSFGGvKcTS4fqGAwFxmykxMQ7YVE",
  authDomain:"waab-e0dc8.firebaseapp.com",
  projectId:"waab-e0dc8",
  storageBucket:"waab-e0dc8.firebasestorage.app",
  messagingSenderId:"826101902777",
  appId:"1:826101902777:web:65cabb5e7c659d81bb5a68"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

const DEFAULT_DATA = {
  pages: [{
    id: "1",
    label: "Getting Started",
    title: "Welcome",
    subtitle: "Click + Add card to create your first card",
    rows: [{
      id: "r1",
      cols: [{
        id: "c1",
        cards: [
          {id: "card1", type: "text", emoji: "📋", title: "Text Card", content: "This is a text card with emoji. You can edit this!"},
          {id: "card2", type: "trello-ext", title: "Trello Extended", content: "This is the new Trello Extended card type with title and content!"},
          {id: "card3", type: "stat", label: "Example", value: "$100", sub: "per month"}
        ]
      }]
    }]
  }]
};

let appData = null;
let currentUser = null;
let currentPageId = null;
let pendingDelete = null;
let pendingCardTarget = null;

window.openAddPage = () => { openModal('modal-page'); };
window.openAddCard = (pageId, rowId, colId) => {
  pendingCardTarget = {pageId, rowId, colId};
  document.getElementById('card-type-input').value = 'text';
  updateCardTypeLabels();
  openModal('modal-card');
};
window.confirmDelete = (type, ...args) => {
  pendingDelete = {type, args};
  openModal('modal-delete');
};
window.openModal = id => document.getElementById(id).classList.add('show');
window.closeModal = id => document.getElementById(id).classList.remove('show');
window.toggleCardDark = (pageId, rowId, colId, cardId) => {
  const card = getCard(pageId, rowId, colId, cardId);
  if(card){ card.dark = !card.dark; saveData(); renderApp(); }
};
window.addColToRow = (pageId, rowId) => {
  const row = getRow(pageId, rowId);
  if(row){ if(!row.cols) row.cols = []; row.cols.push({id: 'col-'+Date.now(), cards: []}); saveData(); renderApp(); }
};
window.addRowAt = (pageId, idx) => {
  const page = getPage(pageId);
  if(page){ if(!page.rows) page.rows = []; page.rows.splice(idx, 0, {id: 'row-'+Date.now(), cols: [{id: 'col-'+Date.now()+'a', cards: []}, {id: 'col-'+Date.now()+'b', cards: []}]}); saveData(); renderApp(); }
};

document.getElementById('sign-in-btn').addEventListener('click', async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch(e){ console.error(e); }
});
document.getElementById('sign-out-btn').addEventListener('click', () => signOut(auth));

onAuthStateChanged(auth, user => {
  document.getElementById('loading').style.display = 'none';
  if(user){
    currentUser = user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-name').textContent = user.displayName || user.email;
    loadData();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

function loadData(){
  const docRef = doc(db, 'dashboards', currentUser.uid);
  onSnapshot(docRef, snap => {
    appData = snap.exists() ? snap.data() : JSON.parse(JSON.stringify(DEFAULT_DATA));
    currentPageId = currentPageId || appData.pages[0]?.id;
    renderApp();
    setDoc(docRef, appData).catch(e => console.error(e));
  });
}

function saveData(){
  if(!currentUser || !appData) return;
  setDoc(doc(db, 'dashboards', currentUser.uid), appData).catch(e => console.error(e));
  const el = document.getElementById('save-indicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function renderApp(){
  renderSidebar();
  const page = appData.pages.find(p => p.id === currentPageId) || appData.pages[0];
  if(!page) return;
  currentPageId = page.id;
  renderPage(page);
}

function renderSidebar(){
  const nav = document.getElementById('nav-sections');
  nav.innerHTML = '<div class="nav-section-label"><span>Pages</span><button onclick="openAddPage()">＋</button></div>';
  appData.pages?.forEach(page => {
    const item = document.createElement('div');
    item.className = 'nav-item' + (page.id === currentPageId ? ' active' : '');
    item.innerHTML = `<span class="ni-label">${page.label}</span><span class="ni-actions"><button onclick="event.stopPropagation();confirmDelete('page','${page.id}')">🗑️</button></span>`;
    item.addEventListener('click', () => { currentPageId = page.id; renderApp(); });
    nav.appendChild(item);
  });
}

function renderPage(page){
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  const view = document.createElement('div');
  view.className = 'page-view active';

  const header = document.createElement('div');
  header.className = 'page-header';
  const h1 = document.createElement('h1');
  h1.contentEditable = 'true';
  h1.textContent = page.title || '';
  h1.addEventListener('blur', () => { page.title = h1.textContent; saveData(); });
  const p = document.createElement('p');
  p.contentEditable = 'true';
  p.textContent = page.subtitle || '';
  p.addEventListener('blur', () => { page.subtitle = p.textContent; saveData(); });
  header.appendChild(document.createElement('div')).appendChild(h1);
  header.appendChild(document.createElement('div')).appendChild(p);
  header.firstChild.className = 'page-header-left';
  view.appendChild(header);

  const cardsArea = document.createElement('div');
  cardsArea.className = 'cards-area';
  cardsArea.id = 'cards-area';

  const rows = page.rows || [];
  rows.forEach((row, idx) => {
    const gap = document.createElement('div');
    gap.className = 'row-gap';
    gap.innerHTML = `<div class="row-gap-line"></div><button class="row-gap-add" onclick="addRowAt('${page.id}',${idx})">＋</button>`;
    cardsArea.appendChild(gap);
    
    const rowEl = document.createElement('div');
    rowEl.className = 'notion-row';
    rowEl.dataset.rowid = row.id;
    
    const controls = document.createElement('div');
    controls.className = 'row-controls';
    controls.innerHTML = `<button class="row-ctl-btn" onclick="addColToRow('${page.id}','${row.id}')">＋col</button><button class="row-ctl-btn" onclick="confirmDelete('row','${page.id}','${row.id}')" style="color:var(--red)">🗑️</button>`;
    rowEl.appendChild(controls);

    (row.cols || []).forEach((col, colIdx) => {
      if(colIdx > 0){
        const resizer = document.createElement('div');
        resizer.className = 'col-resizer';
        resizer.innerHTML = '<div class="col-resizer-inner"></div>';
        rowEl.appendChild(resizer);
      }
      
      const colEl = document.createElement('div');
      colEl.className = 'notion-col';
      colEl.dataset.colid = col.id;

      (col.cards || []).forEach(card => {
        colEl.appendChild(renderCard(page.id, row.id, col.id, card));
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'add-card-btn';
      addBtn.innerHTML = '＋ Add card';
      addBtn.onclick = () => openAddCard(page.id, row.id, col.id);
      colEl.appendChild(addBtn);

      rowEl.appendChild(colEl);
    });

    cardsArea.appendChild(rowEl);
  });

  const gap = document.createElement('div');
  gap.className = 'row-gap';
  gap.innerHTML = `<div class="row-gap-line"></div><button class="row-gap-add" onclick="addRowAt('${page.id}',${rows.length})">＋</button>`;
  cardsArea.appendChild(gap);

  const addRow = document.createElement('button');
  addRow.className = 'add-row-bottom';
  addRow.innerHTML = '＋ Add row';
  addRow.onclick = () => addRowAt(page.id, rows.length);
  cardsArea.appendChild(addRow);

  view.appendChild(cardsArea);
  container.appendChild(view);
}

function renderCard(pageId, rowId, colId, card){
  if(card.type === 'stat') return renderStatCard(pageId, rowId, colId, card);
  if(card.type === 'trello') return renderTrelloCard(pageId, rowId, colId, card);
  if(card.type === 'trello-ext') return renderTrelloExtCard(pageId, rowId, colId, card);

  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.cardid = card.id;

  const header = document.createElement('div');
  header.className = 'card-header';
  
  const emoji = document.createElement('span');
  emoji.className = 'card-emoji';
  emoji.textContent = card.emoji || '📋';
  
  const title = document.createElement('span');
  title.className = 'card-title-text';
  title.contentEditable = 'true';
  title.textContent = card.title || '';
  title.addEventListener('blur', () => { card.title = title.textContent; saveData(); });
  
  const actions = document.createElement('div');
  actions.className = 'card-actions';
  actions.innerHTML = `<button onclick="toggleCardDark('${pageId}','${rowId}','${colId}','${card.id}')">🌙</button><button onclick="confirmDelete('card','${pageId}','${rowId}','${colId}','${card.id}')">🗑️</button>`;
  
  header.appendChild(emoji);
  header.appendChild(title);
  header.appendChild(actions);
  el.appendChild(header);

  const body = document.createElement('div');
  body.className = 'card-body';
  body.contentEditable = 'true';
  body.textContent = card.content || '';
  body.addEventListener('blur', () => { card.content = body.textContent; saveData(); });
  el.appendChild(body);

  return el;
}

function renderTrelloCard(pageId, rowId, colId, card){
  const el = document.createElement('div');
  el.className = 'trello-card';
  el.dataset.cardid = card.id;

  const header = document.createElement('div');
  header.className = 'trello-card-header';
  
  const title = document.createElement('input');
  title.className = 'trello-card-title';
  title.type = 'text';
  title.value = card.title || '';
  title.addEventListener('blur', () => { card.title = title.value; saveData(); });
  
  const actions = document.createElement('div');
  actions.className = 'trello-card-actions';
  actions.innerHTML = `<button onclick="confirmDelete('card','${pageId}','${rowId}','${colId}','${card.id}')">🗑️</button>`;
  
  header.appendChild(title);
  header.appendChild(actions);
  el.appendChild(header);

  const body = document.createElement('div');
  body.className = 'trello-card-body';
  body.contentEditable = 'true';
  body.textContent = card.content || '';
  body.addEventListener('blur', () => { card.content = body.textContent; saveData(); });
  el.appendChild(body);

  return el;
}

function renderTrelloExtCard(pageId, rowId, colId, card){
  const el = document.createElement('div');
  el.className = 'trello-ext-card';
  el.dataset.cardid = card.id;

  const header = document.createElement('div');
  header.className = 'trello-ext-card-header';
  
  const title = document.createElement('input');
  title.className = 'trello-ext-card-title';
  title.type = 'text';
  title.value = card.title || '';
  title.addEventListener('blur', () => { card.title = title.value; saveData(); });
  
  const actions = document.createElement('div');
  actions.className = 'trello-ext-card-actions';
  actions.innerHTML = `<button onclick="confirmDelete('card','${pageId}','${rowId}','${colId}','${card.id}')">🗑️</button>`;
  
  header.appendChild(title);
  header.appendChild(actions);
  el.appendChild(header);

  const body = document.createElement('div');
  body.className = 'trello-ext-card-body';
  body.contentEditable = 'true';
  body.textContent = card.content || '';
  body.addEventListener('blur', () => { card.content = body.textContent; saveData(); });
  el.appendChild(body);

  return el;
}

function renderStatCard(pageId, rowId, colId, card){
  const el = document.createElement('div');
  el.className = 'stat-card' + (card.dark ? ' dark' : '');
  el.dataset.cardid = card.id;

  const label = document.createElement('div');
  label.className = 'sc-label';
  label.contentEditable = 'true';
  label.textContent = card.label || '';
  label.addEventListener('blur', () => { card.label = label.textContent; saveData(); });

  const value = document.createElement('div');
  value.className = 'sc-value';
  value.contentEditable = 'true';
  value.textContent = card.value || '';
  value.addEventListener('blur', () => { card.value = value.textContent; saveData(); });

  const sub = document.createElement('div');
  sub.className = 'sc-sub';
  sub.contentEditable = 'true';
  sub.textContent = card.sub || '';
  sub.addEventListener('blur', () => { card.sub = sub.textContent; saveData(); });

  const actions = document.createElement('div');
  actions.className = 'card-actions';
  actions.style.cssText = 'position:absolute;top:8px;right:8px;';
  actions.innerHTML = `<button onclick="toggleCardDark('${pageId}','${rowId}','${colId}','${card.id}')">🌙</button><button onclick="confirmDelete('card','${pageId}','${rowId}','${colId}','${card.id}')">🗑️</button>`;

  el.appendChild(label);
  el.appendChild(value);
  el.appendChild(sub);
  el.appendChild(actions);

  return el;
}

function updateCardTypeLabels(){
  const type = document.getElementById('card-type-input').value;
  const emojiLabel = document.getElementById('emoji-label');
  const titleLabel = document.getElementById('title-label');
  const contentLabel = document.getElementById('content-label');
  const emojiRow = document.getElementById('card-emoji-row');

  emojiLabel.style.display = (type === 'stat' || type === 'trello' || type === 'trello-ext') ? 'none' : 'block';
  emojiRow.style.display = (type === 'stat' || type === 'trello' || type === 'trello-ext') ? 'none' : 'flex';
  titleLabel.textContent = type === 'stat' ? 'Label' : 'Title';
  contentLabel.textContent = type === 'stat' ? 'Value' : 'Content';
}

document.getElementById('card-type-input').addEventListener('change', updateCardTypeLabels);

document.getElementById('modal-page-save').onclick = () => {
  const name = document.getElementById('page-name-input').value.trim();
  if(!name) return;
  appData.pages.push({id: 'page-'+Date.now(), label: name, title: name, subtitle: '', rows: []});
  saveData();
  closeModal('modal-page');
  renderApp();
  document.getElementById('page-name-input').value = '';
};

document.getElementById('modal-card-save').onclick = () => {
  if(!pendingCardTarget) return;
  const {pageId, rowId, colId} = pendingCardTarget;
  const col = getCol(pageId, rowId, colId);
  if(!col) return;

  const type = document.getElementById('card-type-input').value;
  const title = document.getElementById('card-title-input').value.trim();
  const content = document.getElementById('card-content-input').value.trim();
  
  let newCard;
  if(type === 'stat'){
    newCard = {id: 'card-'+Date.now(), type: 'stat', label: title || 'Label', value: content || '', sub: ''};
  } else if(type === 'trello'){
    newCard = {id: 'card-'+Date.now(), type: 'trello', title: title || 'Card', content: content || ''};
  } else if(type === 'trello-ext'){
    newCard = {id: 'card-'+Date.now(), type: 'trello-ext', title: title || 'Card', content: content || ''};
  } else {
    const emoji = document.querySelector('#card-emoji-row .emoji-opt.selected')?.dataset.emoji || '📋';
    newCard = {id: 'card-'+Date.now(), type: 'text', emoji, title: title || 'Card', content: content || ''};
  }
  
  if(!col.cards) col.cards = [];
  col.cards.push(newCard);
  saveData();
  closeModal('modal-card');
  renderApp();
};

document.getElementById('modal-delete-confirm').onclick = () => {
  if(!pendingDelete) return;
  const {type, args} = pendingDelete;
  
  if(type === 'page'){
    appData.pages = appData.pages.filter(p => p.id !== args[0]);
    if(currentPageId === args[0]) currentPageId = appData.pages[0]?.id;
  } else if(type === 'row'){
    const [pageId, rowId] = args;
    const page = getPage(pageId);
    if(page) page.rows = (page.rows || []).filter(r => r.id !== rowId);
  } else if(type === 'card'){
    const [pageId, rowId, colId, cardId] = args;
    const col = getCol(pageId, rowId, colId);
    if(col) col.cards = (col.cards || []).filter(c => c.id !== cardId);
  }
  saveData();
  closeModal('modal-delete');
  renderApp();
};

document.querySelectorAll('.emoji-opt').forEach(el => {
  el.addEventListener('click', function(){
    this.parentElement.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
    this.classList.add('selected');
  });
});

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target === m) m.classList.remove('show'); });
});

function getPage(pageId){ return appData.pages.find(p => p.id === pageId); }
function getRow(pageId, rowId){ const p = getPage(pageId); return p ? (p.rows || []).find(r => r.id === rowId) : null; }
function getCol(pageId, rowId, colId){ const r = getRow(pageId, rowId); return r ? (r.cols || []).find(c => c.id === colId) : null; }
function getCard(pageId, rowId, colId, cardId){ const c = getCol(pageId, rowId, colId); return c ? (c.cards || []).find(card => card.id === cardId) : null; }
</script>
</body>
</html>
