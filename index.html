<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Two Witches & A Broom · Manuela VA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
:root{
  --purple:#3d2b8e;--purple-mid:#5c43b0;--purple-light:#ebe8f7;
  --purple-soft:#f3f1fb;--lavender:#d4cef5;--cream:#faf9f6;
  --text:#1a1630;--text-muted:#6b6588;--accent:#8b73e0;
  --sidebar-w:230px;
  --card-w:260px;
  --col-gap:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}

/* ─── SIDEBAR ─── */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--purple);display:flex;flex-direction:column;padding:22px 16px;z-index:200;overflow-y:auto;}
.logo-area{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.13);}
.logo-icon{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.logo-text h2{font-family:'Playfair Display',serif;font-size:12px;color:white;line-height:1.3;margin:0;}
.logo-text span{font-size:10px;color:var(--lavender);font-weight:300;}
.nav-section{margin-bottom:6px;}
.nav-section-label{display:flex;align-items:center;justify-content:space-between;font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--lavender);opacity:.6;padding:12px 8px 5px;font-weight:600;}
.nav-section-label button{opacity:0;background:none;border:none;color:var(--lavender);cursor:pointer;font-size:14px;padding:0 2px;transition:opacity .2s;}
.nav-section-label:hover button{opacity:.7;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;transition:all .2s;user-select:none;}
.nav-item:hover,.nav-item.active{background:rgba(255,255,255,.12);color:white;}
.nav-item .ni-emoji{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.nav-item .ni-label{flex:1;}
.nav-item .ni-actions{display:none;gap:2px;}
.nav-item:hover .ni-actions{display:flex;}
.ni-actions button{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:2px 3px;font-size:12px;border-radius:4px;transition:color .15s;}
.add-page-btn{display:flex;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.4);font-size:12px;border:1px dashed rgba(255,255,255,.2);background:none;width:100%;text-align:left;transition:all .2s;margin-top:4px;font-family:'DM Sans',sans-serif;}
.add-page-btn:hover{color:rgba(255,255,255,.8);}

/* ─── CLOCKS ─── */
.clocks-box{margin-top:auto;padding:12px;background:rgba(255,255,255,.08);border-radius:10px;display:flex;flex-direction:column;gap:10px;}
.clocks-box-label{font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--lavender);opacity:.6;font-weight:600;margin-bottom:2px;}
.clock-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.clock-city{font-size:11.5px;color:rgba(255,255,255,.6);font-weight:400;}
.clock-time{font-size:13px;color:white;font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.5px;}

/* ─── MAIN ─── */
.main{margin-left:var(--sidebar-w);padding:28px 32px;min-height:100vh;display:flex;flex-direction:column;}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-shrink:0;}
.page-header-left{flex:1;}
.page-header-left h1{font-family:'Playfair Display',serif;font-size:28px;color:var(--purple);line-height:1;cursor:text;margin:0;}
.page-header-left p{margin-top:5px;font-size:13px;color:var(--text-muted);font-weight:300;cursor:text;margin:0;}
.page-header-right{display:flex;align-items:flex-end;gap:12px;}
.add-col-btn{background:white;color:var(--purple);border:1.5px solid var(--lavender);border-radius:10px;padding:8px 16px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
.add-col-btn:hover{background:var(--purple);color:white;border-color:var(--purple);}
.date-badge{background:var(--purple-light);border-radius:10px;padding:10px 16px;text-align:right;}
.date-badge .day{font-family:'Playfair Display',serif;font-size:22px;color:var(--purple);font-weight:700;}
.date-badge .ds{font-size:11px;color:var(--text-muted);}

/* ─── BOARD ─── */
.board{display:flex;gap:var(--col-gap);align-items:flex-start;flex:1;overflow-x:auto;padding-bottom:24px;min-height:400px;}
.board::-webkit-scrollbar{height:6px;}
.board::-webkit-scrollbar-track{background:transparent;}
.board::-webkit-scrollbar-thumb{background:var(--lavender);border-radius:99px;}

/* ─── COLUMN ─── */
.column{flex:0 0 var(--card-w);background:var(--purple-soft);border-radius:14px;border:1px solid #e4dff5;display:flex;flex-direction:column;min-height:80px;transition:background .15s;}
.column.drag-over{background:var(--purple-light);}
.col-header{display:flex;align-items:center;justify-content:space-between;padding:12px 12px 8px;gap:6px;}
.col-title{font-size:13px;font-weight:600;color:var(--purple-mid);flex:1;cursor:text;outline:none;background:none;border:none;font-family:'DM Sans',sans-serif;min-width:0;}
.col-title:focus{background:white;border-radius:6px;padding:2px 6px;}
.col-actions{display:flex;gap:2px;flex-shrink:0;}
.col-actions button{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:6px;font-size:13px;color:var(--text-muted);transition:all .15s;}
.col-actions button:hover{background:var(--purple-light);color:var(--purple);}
.col-cards{padding:0 8px 8px;display:flex;flex-direction:column;gap:8px;flex:1;}

/* ─── CARD ─── */
.card{background:white;border-radius:10px;border:1px solid #e8e4f7;box-shadow:0 1px 4px rgba(61,43,142,.07);cursor:pointer;transition:box-shadow .18s,transform .12s;user-select:none;}
.card:hover{box-shadow:0 4px 14px rgba(61,43,142,.13);transform:translateY(-1px);}
.card.dragging{opacity:.35;transform:scale(.97);}
.card.drag-target{outline:2px solid var(--accent);outline-offset:2px;}
.card-inner{padding:10px 12px;}
.card-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;}
.card-preview{font-size:11.5px;color:var(--text-muted);line-height:1.5;margin-top:4px;max-height:40px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 8px;border-top:1px solid #f0ecf9;}
.card-attach-count{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:3px;}
.card-edit-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:11px;padding:2px 6px;border-radius:5px;transition:all .15s;font-family:'DM Sans',sans-serif;}
.card-edit-btn:hover{background:var(--purple-soft);color:var(--purple);}
.add-card-btn{display:flex;align-items:center;gap:6px;margin:0 8px 10px;padding:7px 10px;border-radius:8px;border:none;background:none;cursor:pointer;color:var(--text-muted);font-size:12.5px;font-family:'DM Sans',sans-serif;transition:all .18s;width:calc(100% - 16px);}
.add-card-btn:hover{background:rgba(139,115,224,.12);color:var(--purple-mid);}
.col-ghost{flex:0 0 var(--card-w);border:2px dashed var(--lavender);border-radius:14px;min-height:80px;display:flex;align-items:center;justify-content:center;color:var(--lavender);font-size:13px;cursor:default;opacity:0;transition:opacity .2s;}
.col-ghost.visible{opacity:1;}

/* ─── MODALS ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(20,14,50,.55);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px);}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:20px;padding:28px;width:min(440px,90vw);box-shadow:0 24px 70px rgba(0,0,0,.2);animation:modalIn .2s ease;}
@keyframes modalIn{from{transform:scale(.95) translateY(8px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.modal-wide{width:min(600px,92vw);max-height:85vh;overflow-y:auto;}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--purple);margin-bottom:20px;}
.modal label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.9px;display:block;margin-bottom:6px;}
.modal input,.modal textarea{width:100%;padding:10px 13px;border:1.5px solid #e8e4f7;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;margin-bottom:16px;transition:border .15s;}
.modal input:focus,.modal textarea:focus{border-color:var(--accent);}
.modal textarea{min-height:120px;resize:vertical;}
.modal .emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.modal .emoji-opt{width:36px;height:36px;border-radius:8px;border:2px solid transparent;background:var(--purple-soft);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal .emoji-opt:hover,.modal .emoji-opt.selected{border-color:var(--accent);background:var(--purple-light);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:4px;}
.btn-cancel{padding:9px 20px;border-radius:10px;border:1.5px solid #e8e4f7;background:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-muted);transition:all .2s;}
.btn-cancel:hover{border-color:var(--accent);color:var(--accent);}
.btn-confirm{padding:9px 20px;border-radius:10px;border:none;background:var(--purple);color:white;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;}
.btn-confirm:hover{background:var(--purple-mid);}
.btn-danger{padding:9px 20px;border-radius:10px;border:none;background:#fde8e8;color:#e05c5c;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;}
.btn-danger:hover{background:#e05c5c;color:white;}
.card-detail-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--purple);margin-bottom:6px;outline:none;border:none;background:none;width:100%;font-weight:700;}
.card-detail-content{width:100%;padding:10px 13px;border:1.5px solid #e8e4f7;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;min-height:160px;resize:vertical;line-height:1.7;transition:border .15s;}
.card-detail-content:focus{border-color:var(--accent);}
.attach-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.attach-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--purple-soft);border-radius:8px;font-size:12.5px;}
.attach-row span{flex:1;color:var(--text-muted);}
.attach-row button{background:none;border:none;color:#e05c5c;cursor:pointer;font-size:13px;line-height:1;}
.attach-section-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:8px;}
.add-attach-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:1.5px dashed var(--lavender);background:none;cursor:pointer;color:var(--text-muted);font-size:12.5px;font-family:'DM Sans',sans-serif;transition:all .2s;margin-bottom:16px;}
.add-attach-btn:hover{border-color:var(--accent);color:var(--purple);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo-area">
    <div class="logo-icon">🧙</div>
    <div class="logo-text">
      <h2>Two Witches & A Broom</h2>
      <span>Manuela VA</span>
    </div>
  </div>
  <div id="nav-sections"></div>
  <div class="clocks-box">
    <div class="clocks-box-label">🕐 World Clocks</div>
    <div class="clock-row">
      <span class="clock-city">🇧🇷 Gramado RS</span>
      <span class="clock-time" id="clock-gramado">--:--</span>
    </div>
    <div class="clock-row">
      <span class="clock-city">🇺🇸 Findlay OH</span>
      <span class="clock-time" id="clock-findlay">--:--</span>
    </div>
    <div class="clock-row">
      <span class="clock-city">🇺🇸 Montana</span>
      <span class="clock-time" id="clock-montana">--:--</span>
    </div>
  </div>
</div>

<main class="main">
  <div class="page-header">
    <div class="page-header-left">
      <h1 id="page-title" contenteditable="true">Dashboard</h1>
      <p id="page-subtitle" contenteditable="true">Overview & daily tasks</p>
    </div>
    <div class="page-header-right">
      <button class="add-col-btn" onclick="addColumn()">＋ Add Column</button>
      <div class="date-badge">
        <div class="day" id="day-name">Mon</div>
        <div class="ds" id="date-str">Jan 1</div>
      </div>
    </div>
  </div>
  <div id="board" class="board"></div>
</main>

<div class="modal-overlay" id="modal-page">
  <div class="modal">
    <h3 id="modal-page-heading">New Page</h3>
    <label>Icon</label>
    <div class="emoji-row" id="page-emoji-row">
      <span class="emoji-opt selected" data-emoji="🏠">🏠</span>
      <span class="emoji-opt" data-emoji="📋">📋</span>
      <span class="emoji-opt" data-emoji="💬">💬</span>
      <span class="emoji-opt" data-emoji="🧼">🧼</span>
      <span class="emoji-opt" data-emoji="💰">💰</span>
      <span class="emoji-opt" data-emoji="🏢">🏢</span>
    </div>
    <label>Name</label>
    <input type="text" id="page-name-input" placeholder="Page name..."/>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modal-page')">Cancel</button>
      <button class="btn-confirm" id="modal-page-save">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-card">
  <div class="modal modal-wide">
    <input class="card-detail-title" id="card-detail-title" placeholder="Card title…"/>
    <label>Content</label>
    <textarea class="card-detail-content" id="card-detail-content" placeholder="Add notes, scripts, reminders…"></textarea>
    <div id="attach-section" style="margin-top:4px;">
      <div class="attach-section-label" id="attach-section-label" style="display:none;">Attachments</div>
      <div class="attach-list" id="attach-list"></div>
      <button class="add-attach-btn" onclick="triggerFileInput()">📎 Add attachment</button>
      <input type="file" id="file-input" style="display:none" onchange="handleFileInput()"/>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="card-delete-btn">Delete</button>
      <button class="btn-cancel" onclick="closeCardModal()">Cancel</button>
      <button class="btn-confirm" id="card-save-btn">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-col">
  <div class="modal">
    <h3>Rename Column</h3>
    <label>Name</label>
    <input type="text" id="col-name-input" placeholder="Column name..."/>
    <div class="modal-actions">
      <button class="btn-danger" id="col-delete-btn">Delete</button>
      <button class="btn-cancel" onclick="closeModal('modal-col')">Cancel</button>
      <button class="btn-confirm" id="col-save-btn">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-preview">
  <div class="modal" style="width:min(720px,94vw);max-height:90vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 id="preview-filename" style="font-size:16px;word-break:break-all;margin:0;"></h3>
      <button onclick="closeModal('modal-preview')" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);line-height:1;padding:0 4px;">×</button>
    </div>
    <div id="preview-body"></div>
  </div>
</div>

<script>
// ─── DATA ───
let appData = {
  pages: [
    {
      id: 'p1', emoji: '🏠', label: 'Dashboard',
      title: 'Dashboard', subtitle: 'Overview & daily tasks',
      columns: [
        { id: 'col1', title: 'Daily Routine', cards: [
            {id: 'c1', title: 'Morning Checklist', content: '🟢 Check schedule\n🟣 Review leads\n🟠 Check ZenMaid\n🟢 Reply to messages', attachments: []},
            {id: 'c2', title: 'Post-clean Follow-up', content: '• Send thank you message\n• Request review\n• Offer reschedule\n• Update CRM notes', attachments: []},
        ]},
        { id: 'col2', title: 'Rules', cards: [
            {id: 'c3', title: '🚫 Never Do', content: '• Never quote hourly rate to clients\n• Never use the word "time"\n• Never share personal phone\n• Never promise same-day bookings without checking', attachments: []},
            {id: 'c4', title: '✅ Always Do', content: '• Push recurring packages first\n• Update ZenMaid after every call\n• Offer reschedule if cancellation\n• Confirm 24h before appointment', attachments: []},
        ]},
        { id: 'col3', title: 'Quick Refs', cards: [
            {id: 'c5', title: 'Minimum Service Price', content: '$150\n\nNever go below this value — for any service type or client.', attachments: []},
        ]},
      ]
    },
    {
      id: 'p2', emoji: '💬', label: 'Sales',
      title: 'Sales Playbook', subtitle: 'Scripts and strategies',
      columns: [
        { id: 'col4', title: 'Call Flow', cards: [
            {id: 'c6', title: 'Sales Call Steps', content: '1️⃣ Build Rapport — be warm, friendly\n2️⃣ Discovery — ask the right questions\n3️⃣ Identify Pain — what bothers them?\n4️⃣ Offer Solution — position our service\n5️⃣ Close — ask for the booking', attachments: []},
        ]},
        { id: 'col5', title: 'Discovery', cards: [
            {id: 'c7', title: 'Discovery Questions', content: '🛏️ How many bedrooms?\n🚿 How many bathrooms?\n📐 Approx. square footage?\n👨‍👩‍👧 Adults / kids at home?\n🐶 Pets? (type, size)\n🧹 Last time professionally cleaned?', attachments: []},
        ]},
      ]
    },
    {
      id: 'p3', emoji: '🧼', label: 'Services',
      title: 'Services Menu', subtitle: 'What we offer',
      columns: [
        { id: 'col6', title: 'Service Types', cards: [
            {id: 'c8', title: 'Recurring Clean', content: '🟢 Weekly / Biweekly / Monthly\n\nBest value for clients. Always push this option first. Eligible for loyalty pricing after 3 visits.', attachments: []},
            {id: 'c9', title: 'General (One-time)', content: '🔵 Standard deep clean for new or occasional clients.\n\nIdeal entry point — often converts to recurring.', attachments: []},
            {id: 'c10', title: 'Top-to-Bottom (TTB)', content: '🟠 Starting at $490\n\nFull intensive clean. Includes inside appliances, cabinets, windows. Quote individually.', attachments: []},
            {id: 'c11', title: 'Priority Service', content: '🟣 Custom scheduling / priority slots\n\nFor VIP or high-urgency clients. Pricing varies — always confirm with owner first.', attachments: []},
        ]},
      ]
    },
  ]
};

// ─── PERSISTENCE ───
const STORAGE_KEY = 'twb_appdata';
const STORAGE_PAGE = 'twb_currentPage';

function saveData(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); localStorage.setItem(STORAGE_PAGE, currentPageId); } catch(e){}
}
function loadData(){
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) appData = JSON.parse(saved);
    const savedPage = localStorage.getItem(STORAGE_PAGE);
    if(savedPage && appData.pages.find(p => p.id === savedPage)) currentPageId = savedPage;
  } catch(e){}
}

let currentPageId = 'p1';
let pendingPageEdit = null;
let pendingCardEdit = { colId: null, cardId: null };
let pendingColEdit = null;
let dragState = { cardId: null, fromColId: null };

// ─── DATE ───
const now = new Date();
document.getElementById('day-name').textContent = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];
document.getElementById('date-str').textContent = now.toLocaleDateString('en-US',{month:'short',day:'numeric'});

// ─── CLOCKS ───
function formatTime(tz){
  return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false,timeZone:tz});
}
function updateClocks(){
  document.getElementById('clock-gramado').textContent = formatTime('America/Sao_Paulo');
  document.getElementById('clock-findlay').textContent  = formatTime('America/New_York');
  document.getElementById('clock-montana').textContent  = formatTime('America/Denver');
}
updateClocks();
setInterval(updateClocks, 1000);

// ─── RENDER ───
function renderApp(){
  renderSidebar();
  const page = appData.pages.find(p => p.id === currentPageId);
  if(!page) return;
  document.getElementById('page-title').textContent = page.title;
  document.getElementById('page-subtitle').textContent = page.subtitle;
  renderBoard(page);
}

function renderSidebar(){
  const nav = document.getElementById('nav-sections');
  nav.innerHTML = '';
  const sec = document.createElement('div');
  sec.className = 'nav-section';
  sec.innerHTML = `<div class="nav-section-label"><span>Pages</span><button onclick="openAddPage()">＋</button></div>`;
  appData.pages.forEach(page => {
    const item = document.createElement('div');
    item.className = 'nav-item' + (page.id === currentPageId ? ' active' : '');
    item.innerHTML = `<span class="ni-emoji">${page.emoji}</span><span class="ni-label">${escHtml(page.label)}</span><span class="ni-actions"><button onclick="event.stopPropagation();openEditPage('${page.id}')">✏️</button><button onclick="event.stopPropagation();deletePage('${page.id}')">🗑️</button></span>`;
    item.addEventListener('click', () => { currentPageId = page.id; saveData(); renderApp(); });
    sec.appendChild(item);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-page-btn';
  addBtn.textContent = '＋ Add page';
  addBtn.onclick = openAddPage;
  sec.appendChild(addBtn);
  nav.appendChild(sec);
}

function renderBoard(page){
  const board = document.getElementById('board');
  board.innerHTML = '';
  page.columns.forEach(col => {
    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.colId = col.id;
    const hdr = document.createElement('div');
    hdr.className = 'col-header';
    const titleEl = document.createElement('input');
    titleEl.className = 'col-title';
    titleEl.value = col.title;
    titleEl.addEventListener('blur', () => { col.title = titleEl.value; saveData(); });
    titleEl.addEventListener('keydown', e => { if(e.key === 'Enter') titleEl.blur(); });
    const actions = document.createElement('div');
    actions.className = 'col-actions';
    actions.innerHTML = `<button title="Delete column" onclick="openDeleteCol('${col.id}')">🗑️</button>`;
    hdr.appendChild(titleEl); hdr.appendChild(actions); colEl.appendChild(hdr);
    const cardsContainer = document.createElement('div');
    cardsContainer.className = 'col-cards';
    cardsContainer.dataset.colId = col.id;
    col.cards.forEach(card => cardsContainer.appendChild(createCardEl(card, col.id)));
    const dropZone = document.createElement('div');
    dropZone.style.cssText = 'flex:1;min-height:20px;';
    setupDropZone(dropZone, col.id, null);
    cardsContainer.appendChild(dropZone);
    colEl.appendChild(cardsContainer);
    const addBtn = document.createElement('button');
    addBtn.className = 'add-card-btn';
    addBtn.innerHTML = '<span style="font-size:16px;line-height:1">＋</span> Add card';
    addBtn.onclick = () => openNewCard(col.id);
    colEl.appendChild(addBtn);
    colEl.addEventListener('dragover', e => { e.preventDefault(); colEl.classList.add('drag-over'); });
    colEl.addEventListener('dragleave', e => { if(!colEl.contains(e.relatedTarget)) colEl.classList.remove('drag-over'); });
    colEl.addEventListener('drop', e => { e.preventDefault(); colEl.classList.remove('drag-over'); if(!dragState.cardId) return; moveCard(dragState.cardId, dragState.fromColId, col.id, null); });
    board.appendChild(colEl);
  });
}

function createCardEl(card, colId){
  const el = document.createElement('div');
  el.className = 'card'; el.draggable = true; el.dataset.cardId = card.id; el.dataset.colId = colId;
  const preview = card.content ? card.content.replace(/\n/g,' ').slice(0,90) : '';
  const hasAttach = card.attachments && card.attachments.length > 0;
  el.innerHTML = `<div class="card-inner"><div class="card-title-row"><span class="card-title">${escHtml(card.title)}</span></div>${preview ? `<div class="card-preview">${escHtml(preview)}</div>` : ''}</div>${hasAttach ? `<div class="card-footer"><span class="card-attach-count">📎 ${card.attachments.length}</span></div>` : ''}`;
  el.addEventListener('click', () => openCardModal(colId, card.id));
  el.addEventListener('dragstart', e => { dragState = { cardId: card.id, fromColId: colId }; el.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', card.id); });
  el.addEventListener('dragend', () => { el.classList.remove('dragging'); dragState = { cardId: null, fromColId: null }; });
  el.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); if(dragState.cardId && dragState.cardId !== card.id) el.classList.add('drag-target'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-target'));
  el.addEventListener('drop', e => { e.preventDefault(); e.stopPropagation(); el.classList.remove('drag-target'); if(!dragState.cardId || dragState.cardId === card.id) return; moveCard(dragState.cardId, dragState.fromColId, colId, card.id); });
  return el;
}

function setupDropZone(el, colId, beforeCardId){
  el.addEventListener('dragover', e => { e.preventDefault(); e.stopPropagation(); });
  el.addEventListener('drop', e => { e.preventDefault(); e.stopPropagation(); if(!dragState.cardId) return; moveCard(dragState.cardId, dragState.fromColId, colId, beforeCardId); });
}

function moveCard(cardId, fromColId, toColId, beforeCardId){
  const page = appData.pages.find(p => p.id === currentPageId);
  const fromCol = page.columns.find(c => c.id === fromColId);
  const toCol = page.columns.find(c => c.id === toColId);
  if(!fromCol || !toCol) return;
  const cardIdx = fromCol.cards.findIndex(c => c.id === cardId);
  if(cardIdx === -1) return;
  const [card] = fromCol.cards.splice(cardIdx, 1);
  if(beforeCardId){ const bi = toCol.cards.findIndex(c => c.id === beforeCardId); if(bi !== -1){ toCol.cards.splice(bi, 0, card); } else { toCol.cards.push(card); } } else { toCol.cards.push(card); }
  renderBoard(page); saveData();
}

function addColumn(){
  const page = appData.pages.find(p => p.id === currentPageId);
  if(!page) return;
  page.columns.push({ id: 'col'+Date.now(), title: 'New Column', cards: [] });
  renderBoard(page); saveData();
}

function openDeleteCol(colId){
  pendingColEdit = colId;
  const page = appData.pages.find(p => p.id === currentPageId);
  const col = page.columns.find(c => c.id === colId);
  document.getElementById('col-name-input').value = col ? col.title : '';
  document.getElementById('col-delete-btn').onclick = () => { page.columns = page.columns.filter(c => c.id !== colId); closeModal('modal-col'); renderBoard(page); saveData(); };
  document.getElementById('col-save-btn').onclick = () => { if(col) col.title = document.getElementById('col-name-input').value.trim() || col.title; closeModal('modal-col'); renderBoard(page); saveData(); };
  openModal('modal-col');
}

function openCardModal(colId, cardId){
  const page = appData.pages.find(p => p.id === currentPageId);
  const col = page.columns.find(c => c.id === colId);
  const card = col.cards.find(c => c.id === cardId);
  if(!card) return;
  pendingCardEdit = { colId, cardId };
  document.getElementById('card-detail-title').value = card.title;
  document.getElementById('card-detail-content').value = card.content;
  renderAttachList(card);
  document.getElementById('card-delete-btn').onclick = () => { col.cards = col.cards.filter(c => c.id !== cardId); closeCardModal(); renderBoard(page); saveData(); };
  openModal('modal-card');
}

function openNewCard(colId){
  pendingCardEdit = { colId, cardId: null };
  document.getElementById('card-detail-title').value = '';
  document.getElementById('card-detail-content').value = '';
  document.getElementById('attach-list').innerHTML = '';
  document.getElementById('attach-section-label').style.display = 'none';
  document.getElementById('card-delete-btn').onclick = () => closeCardModal();
  document.getElementById('card-delete-btn').textContent = 'Cancel';
  openModal('modal-card');
}

document.getElementById('card-save-btn').onclick = () => {
  const title = document.getElementById('card-detail-title').value.trim();
  const content = document.getElementById('card-detail-content').value.trim();
  if(!title) return;
  const page = appData.pages.find(p => p.id === currentPageId);
  const col = page.columns.find(c => c.id === pendingCardEdit.colId);
  if(!col) return;
  if(pendingCardEdit.cardId){ const card = col.cards.find(c => c.id === pendingCardEdit.cardId); if(card){ card.title = title; card.content = content; } }
  else { col.cards.push({ id: 'c'+Date.now(), title, content, attachments: [] }); }
  document.getElementById('card-delete-btn').textContent = 'Delete';
  closeCardModal(); renderBoard(page); saveData();
};

function closeCardModal(){ document.getElementById('card-delete-btn').textContent = 'Delete'; closeModal('modal-card'); }

function attachIcon(type){
  if(type.startsWith('image/')) return '🖼️';
  if(type === 'application/pdf') return '📄';
  if(type.includes('word')) return '📝';
  if(type.includes('sheet') || type.includes('excel') || type.includes('csv')) return '📊';
  return '📎';
}

function openAttachment(att){
  if(!att || !att.data){ alert('No file data found.'); return; }
  const body = document.getElementById('preview-body');
  document.getElementById('preview-filename').textContent = att.name;
  body.innerHTML = '';
  if(att.type.startsWith('image/')){
    const img = document.createElement('img');
    img.src = att.data;
    img.style.cssText = 'max-width:100%;max-height:70vh;object-fit:contain;border-radius:8px;display:block;margin:0 auto;';
    body.appendChild(img);
  } else if(att.type === 'application/pdf'){
    const embed = document.createElement('embed');
    embed.src = att.data; embed.type = 'application/pdf';
    embed.style.cssText = 'width:100%;height:70vh;border-radius:8px;';
    body.appendChild(embed);
  } else {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'text-align:center;padding:32px;';
    wrap.innerHTML = `<div style="font-size:48px;margin-bottom:12px;">${attachIcon(att.type)}</div><div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:20px;">${escHtml(att.name)}</div><a href="${att.data}" download="${escHtml(att.name)}" style="background:var(--purple);color:white;padding:10px 24px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600;">⬇ Download</a>`;
    body.appendChild(wrap);
  }
  document.getElementById('modal-preview').classList.add('show');
}

function renderAttachList(card){
  const list = document.getElementById('attach-list');
  const label = document.getElementById('attach-section-label');
  list.innerHTML = '';
  if(card.attachments && card.attachments.length > 0){
    label.style.display = 'block';
    card.attachments.forEach((att, idx) => {
      const row = document.createElement('div');
      row.className = 'attach-row';
      const icon = attachIcon(att.type || '');
      row.innerHTML = `<span class="attach-open" style="cursor:pointer;flex:1;color:var(--purple-mid);font-weight:500;">${icon} ${escHtml(att.name)}</span><span style="font-size:11px;color:var(--text-muted);margin-right:8px;">${att.size ? (att.size/1024).toFixed(1)+'KB' : ''}</span><button class="attach-del">×</button>`;
      row.querySelector('.attach-open').addEventListener('click', () => { const live = attachmentRef(idx); if(live) openAttachment(live); });
      row.querySelector('.attach-del').addEventListener('click', () => removeAttachFromModal(idx));
      list.appendChild(row);
    });
  } else { label.style.display = 'none'; }
}

function attachmentRef(idx){
  const page = appData.pages.find(p => p.id === currentPageId);
  const col = page.columns.find(c => c.id === pendingCardEdit.colId);
  const card = col && col.cards.find(c => c.id === pendingCardEdit.cardId);
  return card && card.attachments ? card.attachments[idx] : null;
}

function removeAttachFromModal(idx){
  const page = appData.pages.find(p => p.id === currentPageId);
  const col = page.columns.find(c => c.id === pendingCardEdit.colId);
  const card = col && col.cards.find(c => c.id === pendingCardEdit.cardId);
  if(!card) return;
  card.attachments.splice(idx, 1);
  saveData(); renderAttachList(card);
}

function triggerFileInput(){ document.getElementById('file-input').click(); }

function handleFileInput(){
  const file = document.getElementById('file-input').files[0];
  if(!file || !pendingCardEdit.cardId) return;
  const page = appData.pages.find(p => p.id === currentPageId);
  const col = page.columns.find(c => c.id === pendingCardEdit.colId);
  const card = col && col.cards.find(c => c.id === pendingCardEdit.cardId);
  if(!card) return;
  if(!card.attachments) card.attachments = [];
  const reader = new FileReader();
  reader.onload = e => { card.attachments.push({ name: file.name, size: file.size, type: file.type, data: e.target.result }); saveData(); renderAttachList(card); };
  reader.readAsDataURL(file);
  document.getElementById('file-input').value = '';
}

function openAddPage(){
  pendingPageEdit = null;
  document.getElementById('modal-page-heading').textContent = 'New Page';
  document.getElementById('page-name-input').value = '';
  document.querySelectorAll('#page-emoji-row .emoji-opt').forEach((el,i) => el.classList.toggle('selected', i===0));
  openModal('modal-page');
}

function openEditPage(pageId){
  const page = appData.pages.find(p => p.id === pageId);
  if(!page) return;
  pendingPageEdit = pageId;
  document.getElementById('modal-page-heading').textContent = 'Edit Page';
  document.getElementById('page-name-input').value = page.label;
  document.querySelectorAll('#page-emoji-row .emoji-opt').forEach(el => el.classList.toggle('selected', el.dataset.emoji === page.emoji));
  openModal('modal-page');
}

function deletePage(pageId){
  if(appData.pages.length <= 1){ alert('Cannot delete the only page.'); return; }
  appData.pages = appData.pages.filter(p => p.id !== pageId);
  if(currentPageId === pageId) currentPageId = appData.pages[0].id;
  saveData(); renderApp();
}

document.getElementById('modal-page-save').onclick = () => {
  const name = document.getElementById('page-name-input').value.trim();
  if(!name) return;
  const emoji = document.querySelector('#page-emoji-row .emoji-opt.selected')?.dataset.emoji || '📋';
  if(pendingPageEdit){ const page = appData.pages.find(p => p.id === pendingPageEdit); if(page){ page.label = name; page.emoji = emoji; page.title = name; } pendingPageEdit = null; }
  else { appData.pages.push({ id:'p'+Date.now(), emoji, label:name, title:name, subtitle:'', columns:[] }); }
  closeModal('modal-page'); saveData(); renderApp();
};

function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if(e.target === m) m.classList.remove('show'); });
});

document.querySelectorAll('.emoji-row').forEach(row => {
  row.addEventListener('click', e => {
    const opt = e.target.closest('.emoji-opt');
    if(!opt) return;
    row.querySelectorAll('.emoji-opt').forEach(el => el.classList.remove('selected'));
    opt.classList.add('selected');
  });
});

function escHtml(text){ const d = document.createElement('div'); d.textContent = text || ''; return d.innerHTML; }

document.getElementById('page-title').addEventListener('blur', function(){ const page = appData.pages.find(p => p.id === currentPageId); if(page){ page.title = this.textContent.trim(); saveData(); } });
document.getElementById('page-subtitle').addEventListener('blur', function(){ const page = appData.pages.find(p => p.id === currentPageId); if(page){ page.subtitle = this.textContent.trim(); saveData(); } });

loadData();
renderApp();
</script>
</body>
</html>
